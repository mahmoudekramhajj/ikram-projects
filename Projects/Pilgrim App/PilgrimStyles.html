<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f5f7f5;
    min-height: 100vh;
  }
  body.rtl { direction: rtl; text-align: right; }
  body.ltr { direction: ltr; text-align: left; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    color: #fff;
    padding: 15px 20px;
    text-align: center;
    position: relative;
  }
  .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; }
  .header-logo { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }
  .header h1 { font-size: 1.3rem; margin-bottom: 3px; }
  .header p { opacity: .9; font-size: .85rem; }
  .lang-select {
    position: absolute; top: 10px; left: 10px;
    background: #fff; border: 2px solid #fff; color: #0d47a1;
    padding: 5px 10px; border-radius: 5px; font-family: inherit; font-weight: 600; cursor: pointer;
  }
  body.ltr .lang-select { left: auto; right: 10px; }

  /* Stats Bar */
  .stats-bar {
    background: #f8f9fb; padding: 14px 12px;
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    border-bottom: 3px solid #1565c0;
  }

  .stat-group {
    background: #fff; border-radius: 10px; padding: 10px 14px;
    min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    border-top: 3px solid #ccc; transition: transform .2s, box-shadow .2s;
  }
  .stat-group:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .stat-group-blue   { border-top-color: #1565c0; }
  .stat-group-purple { border-top-color: #7b1fa2; }
  .stat-group-green  { border-top-color: #2e7d32; }
  .stat-group-orange { border-top-color: #e65100; }
  .stat-group-red    { border-top-color: #c62828; }

  .stat-group-title {
    font-size: .65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 6px; opacity: .6;
  }
  .stat-group-blue .stat-group-title   { color: #1565c0; }
  .stat-group-purple .stat-group-title { color: #7b1fa2; }
  .stat-group-green .stat-group-title  { color: #2e7d32; }
  .stat-group-orange .stat-group-title { color: #e65100; }
  .stat-group-red .stat-group-title    { color: #c62828; }

  .stat-group-items { display: flex; gap: 12px; justify-content: center; }

  .stat-item { text-align: center; min-width: 50px; }
  .stat-icon { font-size: 1.1rem; margin-bottom: 2px; }
  .stat-value {
    font-size: 1.4rem; font-weight: 700; color: #333;
    transition: all .3s ease;
  }
  .stat-value.animating { transform: scale(1.2); color: #1565c0; }
  .stat-label { font-size: .65rem; color: #888; margin-top: 1px; }

  .stat-group-blue .stat-value   { color: #1565c0; }
  .stat-group-purple .stat-value { color: #7b1fa2; }
  .stat-group-green .stat-value  { color: #2e7d32; }
  .stat-group-orange .stat-value { color: #e65100; }
  .stat-group-red .stat-value    { color: #c62828; }

  /* Progress bars */
  .stat-bar-wrap {
    display: flex; height: 6px; border-radius: 3px;
    overflow: hidden; margin-top: 8px; background: #eee;
  }
  .stat-bar { height: 100%; transition: width .5s ease; min-width: 2px; }
  .stat-bar-male   { background: #5c6bc0; }
  .stat-bar-female { background: #ec407a; }
  .stat-bar-b2b    { background: #2e7d32; }
  .stat-bar-b2c    { background: #f57c00; }

  /* Search Section */
  .search-section {
    max-width: 1400px; margin: 15px auto; padding: 0 15px;
  }
  .search-box {
    background: #fff; border-radius: 10px; padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 15px;
  }
  .search-title { color: #1565c0; font-size: 1rem; margin-bottom: 12px; font-weight: 700; }
  .search-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .search-group label { display: block; font-size: .75rem; color: #666; margin-bottom: 3px; }
  .search-group input,
  .search-group select {
    width: 100%; padding: 9px 12px;
    border: 1px solid #ddd; border-radius: 6px;
    font-family: inherit; font-size: .85rem;
    transition: border-color .2s;
  }
  .search-group input:focus,
  .search-group select:focus { border-color: #1565c0; outline: none; }

  .search-actions {
    margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px; border: none; border-radius: 6px;
    font-family: inherit; cursor: pointer; font-size: .9rem;
    font-weight: 600; transition: all .2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: #1565c0; color: #fff; }
  .btn-secondary { background: #e8e8e8; color: #333; }
  .btn-export { background: #2e7d32; color: #fff; }
  .btn-whatsapp { background: #25d366; color: #fff; }

  /* Results Bar */
  .results-bar {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px; margin-bottom: 15px; padding: 10px;
    background: #fff; border-radius: 8px;
  }
  .results-count { background: #e3f2fd; padding: 8px 15px; border-radius: 20px; }
  .results-count strong { color: #1565c0; }

  /* Pilgrim Cards */
  .pilgrims-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 15px;
  }
  .pilgrim-card {
    background: #fff; border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s;
  }
  .pilgrim-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,.12); }

  .pilgrim-card-header {
    padding: 12px 15px; color: #fff;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .pilgrim-card-header.main { background: linear-gradient(135deg, #1565c0, #0d47a1); }
  .pilgrim-card-header.member { background: linear-gradient(135deg, #5c6bc0, #3949ab); }

  .pilgrim-name { font-size: 1rem; font-weight: 700; }
  .pilgrim-name-ar { font-size: .8rem; opacity: .9; }
  .pilgrim-type-badge {
    padding: 3px 10px; border-radius: 12px; font-size: .7rem; font-weight: 600;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
  }
  .pilgrim-serial { font-size: .7rem; opacity: .8; }

  .pilgrim-card-body { padding: 15px; }

  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #f0f0f0;
    font-size: .8rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #888; flex-shrink: 0; }
  .info-value { color: #333; font-weight: 600; text-align: left; word-break: break-all; }
  body.rtl .info-value { text-align: right; }

  .info-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: .75rem; font-weight: 600;
  }
  .tag-b2b { background: #e3f2fd; color: #1565c0; }
  .tag-b2c { background: #fce4ec; color: #c62828; }
  .tag-local { background: #fff3e0; color: #e65100; }
  .tag-visa { background: #e8f5e9; color: #2e7d32; }

  /* Group Section */
  .group-section {
    margin-top: 12px; padding-top: 12px; border-top: 2px solid #e3f2fd;
  }
  .group-title {
    font-size: .85rem; color: #1565c0; font-weight: 700; margin-bottom: 8px;
  }
  .group-member {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; background: #f8f9fa; border-radius: 5px; margin-bottom: 4px;
    font-size: .8rem;
  }
  .group-member.is-main { background: #e3f2fd; border-right: 3px solid #1565c0; }
  body.ltr .group-member.is-main { border-right: none; border-left: 3px solid #1565c0; }
  .member-name { font-weight: 600; color: #333; }
  .member-info { color: #666; font-size: .75rem; }

  /* Transport Section */
  .transport-section {
    margin-top: 10px; padding: 10px;
    background: linear-gradient(135deg, #f3e5f5, #ede7f6);
    border-radius: 8px;
  }
  .transport-title { font-size: .8rem; color: #6a1b9a; font-weight: 700; margin-bottom: 6px; }
  .transport-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: .8rem; padding: 4px 0;
  }
  .transport-label { color: #7b1fa2; }
  .transport-value { font-weight: 600; color: #4a148c; }

  /* Package Section */
  .package-section {
    margin-top: 10px; padding: 10px;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border-radius: 8px;
  }
  .package-title { font-size: .8rem; color: #2e7d32; font-weight: 700; margin-bottom: 4px; }
  .package-name { font-size: .85rem; color: #1b5e20; font-weight: 600; }

  /* Password Modal */
  .password-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; justify-content: center; align-items: center; padding: 20px;
  }
  .password-overlay.hidden { display: none; }
  .password-box {
    background: #fff; border-radius: 10px; padding: 30px;
    text-align: center; min-width: 300px;
  }
  .password-box h3 { color: #1565c0; margin-bottom: 20px; }
  .password-box input {
    width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;
    font-size: 1.2rem; text-align: center; margin-bottom: 10px;
  }
  .password-box input:focus { border-color: #1565c0; outline: none; }
  .password-error { color: #dc3545; font-size: .85rem; margin-bottom: 10px; display: none; }
  .password-actions { display: flex; gap: 10px; justify-content: center; }

  /* Loading & Empty States */
  .loading, .no-results {
    text-align: center; padding: 40px;
    background: #fff; border-radius: 10px; margin: 20px 0;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0e0e0; border-top-color: #1565c0;
    border-radius: 50%; animation: spin .8s linear infinite;
    margin: 0 auto 15px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs-bar {
    background: #fff; display: flex; gap: 0;
    border-bottom: 3px solid #1565c0;
    box-shadow: 0 2px 4px rgba(0,0,0,.06);
  }
  .tab-btn {
    padding: 12px 28px; border: none; background: none;
    font-family: inherit; font-size: .9rem; font-weight: 600;
    color: #888; cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -3px; transition: all .2s;
  }
  .tab-btn:hover { color: #1565c0; background: #f5f7ff; }
  .tab-btn.active { color: #1565c0; border-bottom-color: #1565c0; }

  /* Stats Cards */
  .pkg-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 15px;
  }
  .pkg-card {
    background: #fff; border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .pkg-card-header {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    color: #fff; padding: 12px 15px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pkg-card-name { font-weight: 700; font-size: .9rem; }
  .pkg-card-total {
    background: rgba(255,255,255,0.2); padding: 3px 10px;
    border-radius: 12px; font-size: .8rem; font-weight: 600;
  }
  .guide-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 15px; border-bottom: 1px solid #f0f0f0;
    font-size: .85rem;
  }
  .guide-row:last-child { border-bottom: none; }
  .guide-name { color: #333; font-weight: 600; }
  .guide-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: #e8f0fe; border-radius: 3px; }
  .guide-bar { height: 100%; background: #1565c0; border-radius: 3px; min-width: 4px; }
  .guide-count { color: #1565c0; font-weight: 700; min-width: 28px; text-align: left; }
  body.rtl .guide-count { text-align: right; }

  /* Print */
  @media print {
    .header, .search-box, .search-actions, .results-bar, .password-overlay { display: none !important; }
    .pilgrim-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    body { background: #fff; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .pilgrims-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 8px; padding: 10px 8px; }
    .stat-group { min-width: calc(50% - 8px); padding: 8px 10px; }
    .stat-group-items { gap: 8px; }
    .stat-item { min-width: 40px; }
    .stat-icon { font-size: .9rem; }
    .stat-value { font-size: 1.1rem; }
    .stat-label { font-size: .6rem; }
    .stat-group-title { font-size: .6rem; }
    .search-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 400px) {
    .stat-group { min-width: 100%; }
    .search-grid { grid-template-columns: 1fr; }
  }
</style>
