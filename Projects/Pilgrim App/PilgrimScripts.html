// ==================== التهيئة ====================
document.addEventListener('DOMContentLoaded', function() {
  showPasswordScreen();
});

function changeLang(lang) {
  currentLang = lang;
  document.body.className = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  updateUI();
  populateFilters();
  doSearch();
}

// ==================== المصادقة ====================
function showPasswordScreen() {
  document.getElementById('passwordOverlay').classList.remove('hidden');
  document.getElementById('passwordInput').focus();
}

function submitPassword() {
  var entered = document.getElementById('passwordInput').value;
  google.script.run
    .withSuccessHandler(function(correct) {
      if (entered === correct) {
        isAuthenticated = true;
        document.getElementById('passwordOverlay').classList.add('hidden');
        loadData();
      } else {
        document.getElementById('passwordError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    })
    .withFailureHandler(function() {
      document.getElementById('passwordError').style.display = 'block';
    })
    .getPassword();
}

// ==================== تحميل البيانات ====================
function loadData() {
  document.getElementById('resultsArea').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>' + T[currentLang].loading + '</p></div>';

  google.script.run
    .withSuccessHandler(function(json) {
      var data = JSON.parse(json);
      if (!data.success) {
        document.getElementById('resultsArea').innerHTML = '<div class="no-results">Error: ' + (data.error || 'Unknown') + '</div>';
        return;
      }
      allPilgrims = data.pilgrims || [];
      updateStats(data.stats);
      populateFilters();
      doSearch();
    })
    .withFailureHandler(function(err) {
      document.getElementById('resultsArea').innerHTML = '<div class="no-results">Error loading data</div>';
    })
    .getAllPilgrims();
}

// ==================== الإحصائيات ====================
function updateStats(stats) {
  animateStat('statTotal', stats.totalPilgrims || 0);
  animateStat('statGroups', stats.totalGroups || 0);
  animateStat('statCountries', stats.totalCountries || 0);
  animateStat('statPackages', stats.totalPackages || 0);
  animateStat('statB2B', stats.b2b || 0);
  animateStat('statB2C', stats.b2c || 0);
  animateStat('statMale', stats.male || 0);
  animateStat('statFemale', stats.female || 0);
  animateStat('statNationalities', stats.totalNationalities || 0);
  animateStat('statCamps', stats.totalCamps || 0);
  animateStat('statTransports', stats.totalTransports || 0);

  // تحديث أشرطة النسب
  var total = (stats.male || 0) + (stats.female || 0);
  if (total > 0) {
    document.getElementById('barMale').style.width = Math.round((stats.male / total) * 100) + '%';
    document.getElementById('barFemale').style.width = Math.round((stats.female / total) * 100) + '%';
  } else {
    document.getElementById('barMale').style.width = '0%';
    document.getElementById('barFemale').style.width = '0%';
  }
  var totalTickets = (stats.b2b || 0) + (stats.b2c || 0);
  if (totalTickets > 0) {
    document.getElementById('barB2B').style.width = Math.round((stats.b2b / totalTickets) * 100) + '%';
    document.getElementById('barB2C').style.width = Math.round((stats.b2c / totalTickets) * 100) + '%';
  } else {
    document.getElementById('barB2B').style.width = '0%';
    document.getElementById('barB2C').style.width = '0%';
  }
}

function animateStat(id, newVal) {
  var el = document.getElementById(id);
  if (!el) return;
  var formatted = fmtN(newVal);
  if (el.textContent !== formatted) {
    el.textContent = formatted;
    el.classList.add('animating');
    setTimeout(function() { el.classList.remove('animating'); }, 300);
  }
}

// حساب الإحصائيات من نتائج البحث (client-side)
function calcStatsClient(pilgrims) {
  var groups = {}, countries = {}, packages = {};
  var nationalities = {}, camps = {}, transports = {};
  var b2b = 0, b2c = 0, male = 0, female = 0;

  for (var i = 0; i < pilgrims.length; i++) {
    var p = pilgrims[i];
    if (p.groupNo) groups[p.groupNo] = true;
    if (p.country) countries[p.country] = true;
    if (p.packageNo) packages[p.packageNo] = true;
    if (p.nationality) nationalities[p.nationality] = true;
    if (p.camp) camps[p.camp] = true;
    if (p.transportType) transports[p.transportType] = true;
    if (p.flightType === 'B2B') b2b++;
    else if (p.flightType === 'B2C') b2c++;
    if (p.gender === 'ذكر') male++;
    else if (p.gender === 'انثى' || p.gender === 'أنثى') female++;
  }

  return {
    totalPilgrims: pilgrims.length,
    totalGroups: Object.keys(groups).length,
    totalCountries: Object.keys(countries).length,
    totalPackages: Object.keys(packages).length,
    totalNationalities: Object.keys(nationalities).length,
    totalCamps: Object.keys(camps).length,
    totalTransports: Object.keys(transports).length,
    b2b: b2b, b2c: b2c,
    male: male, female: female
  };
}

// ==================== الفلاتر ====================
function populateFilters() {

}

function updateDynamicFilters(data) {
  var t = T[currentLang];

  // حفظ القيم الحالية
  var selCountry    = gv('fCountry');
  var selPackage    = gv('fPackage');
  var selGuide      = gv('fGuide');
  var selFlightType = gv('fFlightType');
  var selGender     = gv('fGender');
  var selNationality = gv('fNationality');
  var selCamp       = gv('fCamp');
  var selTransport  = gv('fTransport');

  // بناء القيم المتاحة من البيانات الحالية
  var countries = [], packages = [], guides = [], flights = [];
  var genders = [], nationalities = [], camps = [], transports = [];
  var seenC = {}, seenP = {}, seenG = {}, seenF = {};
  var seenGn = {}, seenNat = {}, seenCamp = {}, seenTr = {};

  for (var i = 0; i < data.length; i++) {
    var p = data[i];
    if (p.country       && !seenC[p.country])       { seenC[p.country] = true;       countries.push(p.country); }
    if (p.guide         && !seenG[p.guide])          { seenG[p.guide] = true;         guides.push(p.guide); }
    if (p.flightType    && !seenF[p.flightType])     { seenF[p.flightType] = true;    flights.push(p.flightType); }
    if (p.gender        && !seenGn[p.gender])        { seenGn[p.gender] = true;       genders.push(p.gender); }
    if (p.nationality   && !seenNat[p.nationality])  { seenNat[p.nationality] = true; nationalities.push(p.nationality); }
    if (p.camp          && !seenCamp[p.camp])        { seenCamp[p.camp] = true;       camps.push(p.camp); }
    if (p.transportType && !seenTr[p.transportType]) { seenTr[p.transportType] = true; transports.push(p.transportType); }
    if (p.packageNo     && !seenP[p.packageNo])      {
      seenP[p.packageNo] = true;
      packages.push({ no: p.packageNo, name: p.packageName });
    }
  }

  countries.sort();
  guides.sort();
  flights.sort();
  genders.sort();
  nationalities.sort();
  camps.sort();
  transports.sort();
  packages.sort(function(a, b) { return a.no - b.no; });

  fillSelect('fCountry', countries, t.all, selCountry);
  fillSelectPkg('fPackage', packages, t.all, selPackage);
  fillSelect('fGuide', guides, t.all, selGuide);
  fillSelect('fGender', genders, t.all, selGender);
  fillSelect('fNationality', nationalities, t.all, selNationality);
  fillSelect('fCamp', camps, t.all, selCamp);
  fillSelect('fTransport', transports, t.all, selTransport);

  var ftSelect = document.getElementById('fFlightType');
  ftSelect.innerHTML = '';
  var ftAll = document.createElement('option');
  ftAll.value = '';
  ftAll.textContent = t.all;
  ftSelect.appendChild(ftAll);
  for (var f = 0; f < flights.length; f++) {
    var ftOpt = document.createElement('option');
    ftOpt.setAttribute('value', flights[f]);
    ftOpt.textContent = flights[f];
    if (flights[f] === selFlightType) ftOpt.selected = true;
    ftSelect.appendChild(ftOpt);
  }
}

function fillSelect(id, arr, allText, selectedVal) {
  var s = document.getElementById(id);
  if (!s) return;
  s.innerHTML = '';
  var allOpt = document.createElement('option');
  allOpt.value = '';
  allOpt.textContent = allText;
  s.appendChild(allOpt);
  for (var i = 0; i < arr.length; i++) {
    var opt = document.createElement('option');
    opt.setAttribute('value', arr[i]);
    opt.textContent = arr[i];
    if (arr[i] === selectedVal) opt.selected = true;
    s.appendChild(opt);
  }
}

function fillSelectPkg(id, arr, allText, selectedVal) {
  var s = document.getElementById(id);
  if (!s) return;
  s.innerHTML = '';
  var allOpt = document.createElement('option');
  allOpt.value = '';
  allOpt.textContent = allText;
  s.appendChild(allOpt);
  for (var i = 0; i < arr.length; i++) {
    var opt = document.createElement('option');
    opt.setAttribute('value', arr[i].no);
    opt.textContent = arr[i].no + ' - ' + arr[i].name;
    if (String(arr[i].no) === String(selectedVal)) opt.selected = true;
    s.appendChild(opt);
  }
}

// ==================== البحث ====================
function doSearch() {
  var filters = {
    name:        gv('fName').toLowerCase(),
    passport:    gv('fPassport').toUpperCase(),
    group:       gv('fGroup'),
    package:     gv('fPackage'),
    country:     gv('fCountry'),
    contract:    gv('fContract').toLowerCase(),
    guide:       gv('fGuide'),
    flightType:  gv('fFlightType'),
    gender:      gv('fGender'),
    nationality: gv('fNationality'),
    camp:        gv('fCamp'),
    transport:   gv('fTransport')
  };

  var results = allPilgrims.filter(function(p) {
    if (filters.name) {
      var fullEn = (p.firstNameEn + ' ' + p.lastNameEn).toLowerCase();
      var fullAr = (p.firstNameAr + ' ' + p.lastNameAr).toLowerCase();
      if (fullEn.indexOf(filters.name) === -1 && fullAr.indexOf(filters.name) === -1) return false;
    }
    if (filters.passport    && String(p.passport).toUpperCase().indexOf(filters.passport) === -1) return false;
    if (filters.group       && String(p.groupNo) !== filters.group) return false;
    if (filters.package     && String(p.packageNo) !== filters.package) return false;
    if (filters.country     && p.country !== filters.country) return false;
    if (filters.contract    && String(p.contractName).toLowerCase().indexOf(filters.contract) === -1) return false;
    if (filters.guide       && p.guide !== filters.guide) return false;
    if (filters.flightType  && p.flightType !== filters.flightType) return false;
    if (filters.gender      && p.gender !== filters.gender) return false;
    if (filters.nationality && p.nationality !== filters.nationality) return false;
    if (filters.camp        && p.camp !== filters.camp) return false;
    if (filters.transport   && p.transportType !== filters.transport) return false;
    return true;
  });

  currentResults = results;

  // تحديث الإحصائيات بناءً على النتائج المفلترة
  updateStats(calcStatsClient(results));

  // تحديث الفلاتر الديناميكية بناءً على النتائج
  updateDynamicFilters(results);

  showResults(results);
}

function clearSearch() {
  ['fName', 'fPassport', 'fGroup', 'fPackage', 'fCountry', 'fContract', 'fGuide', 'fFlightType', 'fGender', 'fNationality', 'fCamp', 'fTransport'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  doSearch();
}

// ==================== عرض النتائج ====================
function showResults(results) {
  var t = T[currentLang];
  document.getElementById('resultCount').textContent = results.length;

  var area = document.getElementById('resultsArea');
  if (results.length === 0) {
    area.innerHTML = '<div class="no-results">😕 ' + t.noResults + '</div>';
    return;
  }

  var html = '<div class="pilgrims-grid">';
  var shown = {};

  for (var i = 0; i < results.length; i++) {
    var p = results[i];
    if (shown[p.serial]) continue;

    var groupMembers = allPilgrims.filter(function(g) { return g.groupNo === p.groupNo; });

    for (var j = 0; j < groupMembers.length; j++) {
      shown[groupMembers[j].serial] = true;
    }

    html += createPilgrimCard(p, groupMembers);
  }

  html += '</div>';
  area.innerHTML = html;
}

function createPilgrimCard(p, groupMembers) {
  var t = T[currentLang];
  var isMain = p.pilgrimType === 'رئيسي';
  var headerClass = isMain ? 'main' : 'member';
  var fullName = p.firstNameEn + ' ' + p.lastNameEn;
  var fullNameAr = (p.firstNameAr && p.lastNameAr) ? p.firstNameAr + ' ' + p.lastNameAr : '';
  var typeText = isMain ? t.main : t.familyMember;
  var genderText = p.gender === 'ذكر' ? (currentLang === 'ar' ? 'ذكر' : 'Male') : (currentLang === 'ar' ? 'أنثى' : 'Female');

  var flightTag = p.flightType === 'B2B'
    ? '<span class="info-tag tag-b2b">B2B</span>'
    : '<span class="info-tag tag-b2c">B2C</span>';

  var localTag = p.isLocal ? ' <span class="info-tag tag-local">' + t.local + '</span>' : '';

  // Card header
  var html = '<div class="pilgrim-card">' +
    '<div class="pilgrim-card-header ' + headerClass + '">' +
    '<div>' +
    '<div class="pilgrim-name">' + fullName + '</div>' +
    (fullNameAr ? '<div class="pilgrim-name-ar">' + fullNameAr + '</div>' : '') +
    '<div class="pilgrim-serial">#' + p.serial + '</div>' +
    '</div>' +
    '<div style="text-align:center">' +
    '<div class="pilgrim-type-badge">' + typeText + '</div>' +
    '<div style="margin-top:4px">' + flightTag + localTag + '</div>' +
    '</div>' +
    '</div>';

  // Card body
  html += '<div class="pilgrim-card-body">';

  // Basic info
  html += infoRow('🛂 ' + t.passport, p.passport);
  html += infoRow('📅 ' + t.passportExpiry, p.passportExpiry);
  html += infoRow('🎂 ' + t.birthDate, p.birthDate);
  html += infoRow('⚧ ' + t.gender, genderText);
  html += infoRow('🌍 ' + t.country, p.country);
  html += infoRow('🏳️ ' + t.nationality, p.nationality);
  html += infoRow('📧 ' + t.email, p.email);
  html += infoRow('📱 ' + t.phone, p.phone);
  if (p.guide) html += infoRow('🎯 ' + t.guide, p.guide);
  html += infoRow('🧾 ' + t.invoice, p.invoiceNo);
  html += infoRow('📄 ' + t.visa, '<span class="info-tag tag-visa">' + p.visaStatus + '</span>');

  // Camp
  if (p.camp) html += infoRow('🏕️ ' + t.camp, p.camp);

  // Package
  html += '<div class="package-section">' +
    '<div class="package-title">📦 ' + t.package + '</div>' +
    '<div class="package-name">' + p.packageNo + ' - ' + p.packageName + '</div>' +
    '</div>';

  // Contract & Flight
  html += infoRow('✈️ ' + t.contract, p.contractName);
  if (p.ticketNo) {
    var ticketHtml = p.ticketLink
      ? '<a href="' + p.ticketLink + '" target="_blank" style="color:#1565c0">' + p.ticketNo + '</a>'
      : p.ticketNo;
    html += infoRow('🎫 ' + t.ticket, ticketHtml);
  }

  // Transport - من الباقة
  if (p.transportType || p.arrivalTime || p.departureTime) {
    html += '<div class="transport-section">' +
      '<div class="transport-title">' + t.transport + '</div>';
    if (p.transportType) {
      html += '<div class="transport-row">' +
        '<span class="transport-label">🚌 ' + t.transportType + '</span>' +
        '<span class="transport-value">' + p.transportType + '</span></div>';
    }
    if (p.arrivalTime) {
      html += '<div class="transport-row">' +
        '<span class="transport-label">' + t.arrival + '</span>' +
        '<span class="transport-value">' + p.arrivalTime + '</span></div>';
    }
    if (p.departureTime) {
      html += '<div class="transport-row">' +
        '<span class="transport-label">' + t.departure + '</span>' +
        '<span class="transport-value">' + p.departureTime + '</span></div>';
    }
    html += '</div>';
  }

  // Group members
  if (groupMembers.length > 1) {
    html += '<div class="group-section">' +
      '<div class="group-title">' + t.groupMembers + ' (' + groupMembers.length + ')</div>';
    for (var i = 0; i < groupMembers.length; i++) {
      var m = groupMembers[i];
      var mIsMain = m.pilgrimType === 'رئيسي';
      var mName = m.firstNameEn + ' ' + m.lastNameEn;
      var mType = mIsMain ? t.main : t.familyMember;
      html += '<div class="group-member ' + (mIsMain ? 'is-main' : '') + '">' +
        '<span class="member-name">' + (mIsMain ? '👑 ' : '') + mName + '</span>' +
        '<span class="member-info">' + mType + ' | ' + m.passport + '</span>' +
        '</div>';
    }
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

  if (!value) return '';
  return '<div class="info-row"><span class="info-label">' + label + '</span><span class="info-value">' + value + '</span></div>';

function loadPkgStats() {
  document.getElementById('statsArea').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>' + T[currentLang].loading + '</p></div>';
  google.script.run
    .withSuccessHandler(function(json) {
      var data = JSON.parse(json);
      if (!data.success) { document.getElementById('statsArea').innerHTML = '<div class="no-results">Error</div>'; return; }
      allPkgStats = data.data || [];
      renderPkgStats(allPkgStats);
    })
    .withFailureHandler(function() {
      document.getElementById('statsArea').innerHTML = '<div class="no-results">Error loading stats</div>';
    })
    .getGuidePackageStats();
}

function filterStats() {
  var q = document.getElementById('statsFilter').value.toLowerCase();
  var filtered = q ? allPkgStats.filter(function(p) { return p.pkg.toLowerCase().indexOf(q) !== -1; }) : allPkgStats;
  renderPkgStats(filtered);
}

function renderPkgStats(data) {
  if (data.length === 0) {
    document.getElementById('statsArea').innerHTML = '<div class="no-results">😕 ' + T[currentLang].noResults + '</div>';
    return;
  }
  var html = '<div class="pkg-stats-grid">';
  data.forEach(function(item) {
    var maxCount = item.guides[0] ? item.guides[0].count : 1;
    html += '<div class="pkg-card">';
    html += '<div class="pkg-card-header"><span class="pkg-card-name">📦 ' + item.pkg + '</span><span class="pkg-card-total">' + item.total + ' حاج</span></div>';
    item.guides.forEach(function(g) {
      var pct = Math.round((g.count / maxCount) * 100);
      html += '<div class="guide-row">' +
        '<span class="guide-name">👤 ' + g.name + '</span>' +
        '<div class="guide-bar-wrap"><div class="guide-bar" style="width:' + pct + '%"></div></div>' +
        '<span class="guide-count">' + g.count + '</span>' +
        '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('statsArea').innerHTML = html;
}

function captureStats() {
  var t = T[currentLang];
  var dir = currentLang === 'ar' ? 'rtl' : 'ltr';

  // جمع البيانات
  var maleVal = parseInt(document.getElementById('statMale').textContent.replace(/,/g,'')) || 0;
  var femaleVal = parseInt(document.getElementById('statFemale').textContent.replace(/,/g,'')) || 0;
  var b2bVal = parseInt(document.getElementById('statB2B').textContent.replace(/,/g,'')) || 0;
  var b2cVal = parseInt(document.getElementById('statB2C').textContent.replace(/,/g,'')) || 0;
  var genderTotal = maleVal + femaleVal;
  var ticketTotal = b2bVal + b2cVal;
  var malePct = genderTotal > 0 ? Math.round((maleVal / genderTotal) * 100) : 0;
  var femalePct = genderTotal > 0 ? 100 - malePct : 0;
  var b2bPct = ticketTotal > 0 ? Math.round((b2bVal / ticketTotal) * 100) : 0;
  var b2cPct = ticketTotal > 0 ? 100 - b2bPct : 0;

  // جمع الفلاتر المفعّلة
  var activeFilters = [];
  var filterMap = [
    { id: 'fName', label: t.lblName },
    { id: 'fPassport', label: t.lblPassport },
    { id: 'fGroup', label: t.lblGroup },
    { id: 'fPackage', label: t.lblPackage, isSelect: true },
    { id: 'fCountry', label: t.lblCountry, isSelect: true },
    { id: 'fContract', label: t.lblContract },
    { id: 'fGuide', label: t.lblGuide, isSelect: true },
    { id: 'fFlightType', label: t.lblFlightType, isSelect: true },
    { id: 'fGender', label: t.lblGender, isSelect: true },
    { id: 'fNationality', label: t.lblNationality, isSelect: true },
    { id: 'fCamp', label: t.lblCamp, isSelect: true },
    { id: 'fTransport', label: t.lblTransport, isSelect: true }
  ];
  for (var fi = 0; fi < filterMap.length; fi++) {
    var fEl = document.getElementById(filterMap[fi].id);
    if (fEl && fEl.value.trim()) {
      var displayVal = fEl.value.trim();
      if (filterMap[fi].isSelect && fEl.selectedIndex > 0) {
        displayVal = fEl.options[fEl.selectedIndex].textContent;
      }
      activeFilters.push({
        label: filterMap[fi].label.replace(/[^\u0600-\u06FFa-zA-Z\s.]/g, '').trim(),
        value: displayVal
      });
    }
  }
  var hasFilters = activeFilters.length > 0;
  var filterRowH = hasFilters ? 55 + Math.ceil(activeFilters.length / 3) * 42 : 0;

  // رسم Canvas مباشرة
  var W = 900, H = 520 + filterRowH;
  var canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2;
  var ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // خلفية متدرجة
  var bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0d1b2a');
  bgGrad.addColorStop(1, '#1b2838');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, 0, 0, W, H, 16, true);

  // نمط زخرفي علوي
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (var ci = 0; ci < 5; ci++) {
    ctx.beginPath();
    ctx.arc(W * 0.15 + ci * 180, -30, 120 + ci * 20, 0, Math.PI * 2);
    ctx.fill();
  }

  // الهيدر
  var hGrad = ctx.createLinearGradient(30, 20, W - 30, 80);
  hGrad.addColorStop(0, '#1565c0');
  hGrad.addColorStop(1, '#0d47a1');
  ctx.fillStyle = hGrad;
  roundRect(ctx, 30, 20, W - 60, 70, 12, true);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Cairo, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t.headerTitle.replace(/[^\u0600-\u06FFa-zA-Z\s]/g, '').trim(), W / 2, 52);
  ctx.font = '14px Cairo, sans-serif';
  ctx.globalAlpha = 0.85;
  ctx.fillText(t.headerSubtitle, W / 2, 74);
  ctx.globalAlpha = 1;

  // === شريط الفلاتر ===
  var filterEndY = 100;
  var isRTL = currentLang === 'ar';
  if (hasFilters) {
    var fBarY = 105;
    var tagH = 32, tagGap = 10, tagPadX = 16;
    var tagsPerRow = 3;
    var tagAreaW = W - 60;
    var tagW = (tagAreaW - (tagsPerRow - 1) * tagGap) / tagsPerRow;
    var numRows = Math.ceil(activeFilters.length / tagsPerRow);
    var fBarH = 50 + numRows * (tagH + tagGap);

    // خلفية بتدرج أحمر داكن
    var fGrad = ctx.createLinearGradient(30, fBarY, W - 30, fBarY + fBarH);
    fGrad.addColorStop(0, '#b71c1c');
    fGrad.addColorStop(1, '#c62828');
    ctx.fillStyle = fGrad;
    roundRect(ctx, 30, fBarY, tagAreaW, fBarH, 12, true);

    // حدود مضيئة
    ctx.strokeStyle = 'rgba(255,205,210,0.4)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, 30, fBarY, tagAreaW, fBarH, 12, false, true);

    // العنوان
    var filterTitle = isRTL ? 'الفلاتر المطبّقة' : 'Applied Filters';
    ctx.font = 'bold 14px Cairo, sans-serif';
    ctx.textAlign = isRTL ? 'right' : 'left';
    var titleX = isRTL ? W - 60 : 52;
    ctx.fillStyle = '#ffcdd2';
    ctx.fillText('⚙  ' + filterTitle, titleX, fBarY + 22);

    // خط فاصل
    ctx.strokeStyle = 'rgba(255,205,210,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(50, fBarY + 32);
    ctx.lineTo(W - 50, fBarY + 32);
    ctx.stroke();

    // رسم التاغات
    var tagStartY = fBarY + 42;
    for (var af = 0; af < activeFilters.length; af++) {
      var col = af % tagsPerRow;
      var row = Math.floor(af / tagsPerRow);

      // حساب الموقع (RTL أو LTR)
      var tX;
      if (isRTL) {
        tX = (W - 30) - tagAreaW + (tagsPerRow - 1 - col) * (tagW + tagGap);
      } else {
        tX = 30 + col * (tagW + tagGap);
      }
      var tY = tagStartY + row * (tagH + tagGap);

      // خلفية التاغ
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      roundRect(ctx, tX, tY, tagW, tagH, 8, true);
      ctx.strokeStyle = 'rgba(255,205,210,0.25)';
      ctx.lineWidth = 1;
      roundRect(ctx, tX, tY, tagW, tagH, 8, false, true);

      // نقطة ملونة
      ctx.fillStyle = '#ff8a80';
      ctx.beginPath();
      var dotX = isRTL ? tX + tagW - 14 : tX + 14;
      ctx.arc(dotX, tY + tagH / 2, 4, 0, Math.PI * 2);
      ctx.fill();

      // اسم الفلتر (label)
      ctx.fillStyle = '#ffcdd2';
      ctx.font = '10px Cairo, sans-serif';
      ctx.textAlign = isRTL ? 'right' : 'left';
      var lblX = isRTL ? dotX - 12 : dotX + 12;
      ctx.fillText(activeFilters[af].label, lblX, tY + 13);

      // القيمة (value)
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Cairo, sans-serif';
      ctx.fillText(activeFilters[af].value, lblX, tY + 27, tagW - 40);
    }

    filterEndY = fBarY + fBarH + 10;
  }

  // === الصف الأول: 3 بطاقات رئيسية ===
  var row1Y = filterEndY + 10;
  var cardW = 260, cardH = 100, gap = 20;
  var startX = (W - (3 * cardW + 2 * gap)) / 2;

  var mainCards = [
    { icon: '🕌', val: document.getElementById('statTotal').textContent, lbl: t.statTotal, color: '#1565c0' },
    { icon: '👥', val: document.getElementById('statGroups').textContent, lbl: t.statGroups, color: '#5c6bc0' },
    { icon: '📦', val: document.getElementById('statPackages').textContent, lbl: t.statPackages, color: '#7b1fa2' }
  ];

  for (var mc = 0; mc < mainCards.length; mc++) {
    var cx = startX + mc * (cardW + gap);
    drawStatCard(ctx, cx, row1Y, cardW, cardH, mainCards[mc]);
  }

  // === الصف الثاني: الجنس + التذاكر ===
  var row2Y = row1Y + cardH + 20;
  var halfW = (W - 60 - gap) / 2;

  // بطاقة الجنس
  drawBarCard(ctx, 30, row2Y, halfW, 130, t.groupGender, '#7b1fa2',
    [{ lbl: t.statMale, val: maleVal, pct: malePct, color: '#5c6bc0' },
     { lbl: t.statFemale, val: femaleVal, pct: femalePct, color: '#ec407a' }]);

  // بطاقة التذاكر
  drawBarCard(ctx, 30 + halfW + gap, row2Y, halfW, 130, t.groupTickets, '#2e7d32',
    [{ lbl: 'B2B', val: b2bVal, pct: b2bPct, color: '#2e7d32' },
     { lbl: 'B2C', val: b2cVal, pct: b2cPct, color: '#f57c00' }]);

  // === الصف الثالث: الجغرافيا + الميدان ===
  var row3Y = row2Y + 130 + 20;

  // بطاقة الجغرافيا
  var geoCards = [
    { icon: '🌍', val: document.getElementById('statCountries').textContent, lbl: t.statCountries },
    { icon: '🏳️', val: document.getElementById('statNationalities').textContent, lbl: t.statNationalities }
  ];
  drawDoubleCard(ctx, 30, row3Y, halfW, 90, t.groupGeo, '#e65100', geoCards);

  // بطاقة الميدان
  var fieldCards = [
    { icon: '🏕️', val: document.getElementById('statCamps').textContent, lbl: t.statCamps },
    { icon: '🚌', val: document.getElementById('statTransports').textContent, lbl: t.statTransports }
  ];
  drawDoubleCard(ctx, 30 + halfW + gap, row3Y, halfW, 90, t.groupField, '#c62828', fieldCards);

  // الفوتر
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px Cairo, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Ikram AlDyf  •  ' + new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }), W / 2, H - 12);

  // تحميل
  var link = document.createElement('a');
  link.download = 'pilgrim_stats_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// === دوال رسم مساعدة ===
function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawStatCard(ctx, x, y, w, h, data) {
  // خلفية البطاقة
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(ctx, x, y, w, h, 10, true);

  // شريط علوي ملون
  ctx.fillStyle = data.color;
  roundRect(ctx, x, y, w, 4, 2, true);

  // الأيقونة
  ctx.font = '28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(data.icon, x + 40, y + 50);

  // الرقم
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px Cairo, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(data.val, x + w / 2 + 15, y + 50);

  // التسمية
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '12px Cairo, sans-serif';
  ctx.fillText(data.lbl, x + w / 2, y + 75);
}

function drawBarCard(ctx, x, y, w, h, title, titleColor, items) {
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(ctx, x, y, w, h, 10, true);

  // شريط علوي
  ctx.fillStyle = titleColor;
  roundRect(ctx, x, y, w, 4, 2, true);

  // العنوان
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 11px Cairo, sans-serif';
  ctx.textAlign = 'start';
  ctx.fillText(title.toUpperCase(), x + 16, y + 24);

  // العناصر
  var itemY = y + 45;
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    // التسمية والرقم
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '12px Cairo, sans-serif';
    ctx.textAlign = 'start';
    ctx.fillText(it.lbl, x + 16, itemY);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Cairo, sans-serif';
    ctx.textAlign = 'start';
    ctx.fillText(fmtN(it.val), x + 80, itemY + 2);

    // النسبة
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px Cairo, sans-serif';
    ctx.fillText(it.pct + '%', x + 140, itemY);

    // شريط النسبة
    var barX = x + 170, barW = w - 200, barH = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(ctx, barX, itemY - 8, barW, barH, 4, true);
    ctx.fillStyle = it.color;
    var fillW = Math.max(barW * it.pct / 100, 4);
    roundRect(ctx, barX, itemY - 8, fillW, barH, 4, true);

    itemY += 35;
  }
}

function drawDoubleCard(ctx, x, y, w, h, title, titleColor, items) {
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(ctx, x, y, w, h, 10, true);

  ctx.fillStyle = titleColor;
  roundRect(ctx, x, y, w, 4, 2, true);

  ctx.fillStyle = titleColor;
  ctx.font = 'bold 11px Cairo, sans-serif';
  ctx.textAlign = 'start';
  ctx.fillText(title.toUpperCase(), x + 16, y + 24);

  var halfW = (w - 16) / 2;
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var ix = x + 16 + i * halfW;

    ctx.font = '22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(it.icon, ix + halfW / 2, y + 50);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Cairo, sans-serif';
    ctx.fillText(it.val, ix + halfW / 2, y + 72);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px Cairo, sans-serif';
    ctx.fillText(it.lbl, ix + halfW / 2, y + 86);
  }
}

function gv(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }
function fmtN(n) { return Number(n).toLocaleString('en-US'); }
