<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بحث مخيم مِنى — إكرام الضيف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ═══════════════════════════════════════════
       CSS Variables
    ═══════════════════════════════════════════ */
    :root {
      --male: #1565C0;
      --male-light: #E3F2FD;
      --male-border: #90CAF9;
      --male-gradient: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
      
      --female: #AD1457;
      --female-light: #FCE4EC;
      --female-border: #F48FB1;
      --female-gradient: linear-gradient(135deg, #AD1457 0%, #880E4F 100%);
      
      --primary: #0D4A3A;
      --primary-light: #1A6B54;
      --primary-dark: #08332A;
      --accent: #C8A84E;
      --accent-light: #E8D08E;
      
      --bg: #F5F2EB;
      --bg-card: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #5A5A5A;
      --text-light: #8A8A8A;
      --border: #E0DDD6;
      --border-light: #EDEAE3;
      
      --shadow: 0 2px 12px rgba(13, 74, 58, 0.06);
      --shadow-lg: 0 6px 24px rgba(13, 74, 58, 0.1);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    /* ═══════════════════════════════════════════
       Reset & Base
    ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 20px;
    }

    /* ═══════════════════════════════════════════
       Header
    ═══════════════════════════════════════════ */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 16px;
      color: white;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .header-sub {
      font-size: 13px;
      opacity: 0.8;
    }
    .header-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
      font-size: 13px;
    }
    .header-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-stat strong {
      font-size: 16px;
      color: var(--accent-light);
    }
    .btn-refresh {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 5px 16px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-refresh:active {
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════
       Main Search — رقم الصوفا بيد
    ═══════════════════════════════════════════ */
    .main-search {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Tajawal', sans-serif;
      font-size: 18px;
      font-weight: 700;
      direction: ltr;
      text-align: center;
      letter-spacing: 2px;
      background: #FAFAF8;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(13, 74, 58, 0.1);
    }
    .search-input::placeholder {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--text-light);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      fill: var(--text-light);
    }
    .search-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      margin-top: 6px;
    }

    /* ═══════════════════════════════════════════
       Toggle Filters
    ═══════════════════════════════════════════ */
    .filters-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: white;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      user-select: none;
    }
    .filters-toggle svg {
      width: 18px;
      height: 18px;
      fill: var(--primary);
      transition: transform 0.3s;
    }
    .filters-toggle.open svg {
      transform: rotate(180deg);
    }

    /* ═══════════════════════════════════════════
       Filters Panel
    ═══════════════════════════════════════════ */
    .filters-panel {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .filters-panel.open {
      max-height: 600px;
      padding: 12px 16px;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .filter-row.full {
      grid-template-columns: 1fr;
    }
    .filter-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .filter-group select,
    .filter-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      background: #FAFAF8;
      transition: border-color 0.2s;
    }
    .filter-group select:focus,
    .filter-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .filter-group select.active {
      border-color: var(--primary);
      background: rgba(13, 74, 58, 0.04);
    }
    .filter-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .btn-clear {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* ═══════════════════════════════════════════
       Active Filter Chips
    ═══════════════════════════════════════════ */
    .chips-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px;
      background: white;
      border-bottom: 1px solid var(--border-light);
      min-height: 0;
    }
    .chips-bar:empty {
      display: none;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(13, 74, 58, 0.08);
      color: var(--primary);
    }
    .chip-close {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(13, 74, 58, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
    }

    /* ═══════════════════════════════════════════
       Results Counter
    ═══════════════════════════════════════════ */
    .results-header {
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .results-header strong {
      color: var(--primary);
      font-size: 15px;
    }

    /* ═══════════════════════════════════════════
       Pilgrim Card — بطاقة الحاج
       رقم الخيمة + الصوفا بيد = أبرز عنصرين
    ═══════════════════════════════════════════ */
    .card {
      margin: 0 12px 10px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--bg-card);
    }
    
    /* === رأس البطاقة — الخيمة + الصوفا بيد بارزين === */
    .card-tent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      color: white;
      font-weight: 700;
    }
    .card-tent-header.male {
      background: var(--male-gradient);
    }
    .card-tent-header.female {
      background: var(--female-gradient);
    }
    .tent-number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 1px;
    }
    /* === رقم الصوفا بيد — شعار ذهبي بارز على الشريط الملون === */
    .tent-sofa-badge {
      background: var(--accent);
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      direction: ltr;
      line-height: 1.2;
      text-align: center;
    }
    .tent-gender {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .tent-gender-label {
      font-size: 20px;
      font-weight: 800;
    }
    .tent-camp-label {
      font-size: 12px;
      opacity: 0.85;
      font-weight: 500;
    }
    
    /* === جسم البطاقة === */
    .card-body {
      padding: 12px 14px;
    }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .card-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .card-info-item {
      display: flex;
      flex-direction: column;
    }
    .card-info-label {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 500;
    }
    .card-info-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    
    /* === رابط تفاصيل الخيمة === */
    .card-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border-light);
      text-align: center;
    }
    .btn-tent-details {
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ═══════════════════════════════════════════
       Tent Detail Modal
    ═══════════════════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: #DDD;
      margin: 10px auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
    }
    .modal-header-tent {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-tent-badge {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 22px;
      font-weight: 800;
    }
    .modal-tent-badge.male { background: var(--male-gradient); }
    .modal-tent-badge.female { background: var(--female-gradient); }
    .modal-tent-info {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .modal-tent-info strong {
      display: block;
      font-size: 16px;
      color: var(--text);
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .modal-close svg {
      width: 18px;
      height: 18px;
      fill: var(--text-secondary);
    }
    .modal-list {
      padding: 0 16px 16px;
    }
    .modal-pilgrim {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-pilgrim:last-child {
      border-bottom: none;
    }
    .modal-pilgrim-info {
      flex: 1;
    }
    .modal-pilgrim-name {
      font-size: 14px;
      font-weight: 600;
    }
    .modal-pilgrim-detail {
      font-size: 12px;
      color: var(--text-light);
    }
    /* === شعار الصوفا بيد في المودال === */
    .modal-pilgrim-sofa {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      background: var(--accent);
      color: white;
      letter-spacing: 1px;
      direction: ltr;
    }

    /* ═══════════════════════════════════════════
       Loading & Empty States
    ═══════════════════════════════════════════ */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 14px;
      color: var(--text-light);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 15px;
    }
    .warning-msg {
      margin: 0 12px 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: #FFF3E0;
      color: #E65100;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    /* ═══════════════════════════════════════════
       Responsive
    ═══════════════════════════════════════════ */
    @media (min-width: 500px) {
      .card { margin: 0 auto 10px; max-width: 460px; }
      .warning-msg { max-width: 460px; margin: 0 auto 10px; }
    }
  </style>
</head>

<body>

  <!-- ══════ Header ══════ -->
  <div class="header">
    <div class="header-title">⛺ مخيم مِنى</div>
    <div class="header-sub">إكرام الضيف — حج 1447هـ</div>
    <div class="header-stats" id="headerStats">
      <div class="header-stat">حجاج: <strong id="statTotal">-</strong></div>
      <div class="header-stat">خيام: <strong id="statTents">-</strong></div>
    </div>
    <button class="btn-refresh" onclick="forceRefresh()">🔄 تحديث البيانات</button>
  </div>

  <!-- ══════ Main Search — رقم الصوفا بيد ══════ -->
  <div class="main-search">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" class="search-input" id="mainSearch" 
             placeholder="رقم الصوفا بيد أو الجواز أو الاسم"
             autocomplete="off" inputmode="numeric"
             oninput="onMainSearch()">
    </div>
    <div class="search-hint">ابدأ بإدخال رقم الصوفا بيد للبحث السريع</div>
  </div>

  <!-- ══════ Filters Toggle ══════ -->
  <div class="filters-toggle" id="filtersToggle" onclick="toggleFilters()">
    <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
    <span>فلاتر متقدمة</span>
  </div>

  <!-- ══════ Cascading Filters ══════ -->
  <div class="filters-panel" id="filtersPanel">
    <div class="filter-row">
      <div class="filter-group">
        <label>المخيم</label>
        <select id="fCamp" onchange="onFilterChange()"><option value="">الكل</option></select>
      </div>
      <div class="filter-group">
        <label>الجنسية</label>
        <select id="fNationality" onchange="onFilterChange()"><option value="">الكل</option></select>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>دولة الإقامة</label>
        <select id="fResidence" onchange="onFilterChange()"><option value="">الكل</option></select>
      </div>
      <div class="filter-group">
        <label>المرشد</label>
        <select id="fGuide" onchange="onFilterChange()"><option value="">الكل</option></select>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>رقم الخيمة</label>
        <select id="fTent" onchange="onFilterChange()"><option value="">الكل</option></select>
      </div>
      <div class="filter-group">
        <label>ApplicantId</label>
        <input type="text" id="fApplicantId" placeholder="بحث..." 
               autocomplete="off" dir="ltr" style="text-align:left;"
               oninput="onFilterChange()">
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-clear" onclick="clearAllFilters()">مسح الفلاتر</button>
    </div>
  </div>

  <!-- ══════ Active Chips ══════ -->
  <div class="chips-bar" id="chipsBar"></div>

  <!-- ══════ Results ══════ -->
  <div class="results-header" id="resultsHeader" style="display:none;">
    عرض <strong id="resultCount">0</strong> نتيجة
  </div>
  <div id="resultsArea">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text">جاري تحميل البيانات...</div>
    </div>
  </div>

  <!-- ══════ Tent Detail Modal ══════ -->
  <div class="modal-overlay" id="tentModal" onclick="closeTentModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-header-tent">
          <div class="modal-tent-badge" id="modalTentBadge">-</div>
          <div class="modal-tent-info">
            <strong id="modalTentGender">-</strong>
            <span id="modalTentCamp">-</span> — <span id="modalTentCount">0</span> حاج
          </div>
        </div>
        <button class="modal-close" onclick="closeTentModalDirect()">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
        </button>
      </div>
      <div class="modal-list" id="modalList"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       JavaScript
  ═══════════════════════════════════════════ -->
  <script>
    // ══════ البيانات ══════
    var _allData = [];       // كل البيانات من السيرفر
    var _filteredData = [];  // البيانات بعد الفلترة
    var _debounceTimer = null;
    var MAX_RESULTS = 200;

    // مفاتيح البيانات المضغوطة
    var K = {
      TENT: 't', SOFA: 's', APPLICANT_ID: 'a', NAME: 'n', PASSPORT: 'p',
      GENDER: 'g', NATIONALITY: 'na', RESIDENCE: 'r', CAMP: 'c', GUIDE: 'gu', GROUP: 'gr'
    };

    // ══════ التحميل ══════
    window.addEventListener('DOMContentLoaded', function() {
      google.script.run
        .withSuccessHandler(onDataLoaded)
        .withFailureHandler(onDataError)
        .getAllData();
    });

    function onDataLoaded(data) {
      _allData = (data && data.rows) ? data.rows : [];
      document.getElementById('loadingState').style.display = 'none';
      
      // إحصائيات الهيدر
      var tents = {};
      _allData.forEach(function(p) { tents[p[K.TENT]] = true; });
      document.getElementById('statTotal').textContent = _allData.length.toLocaleString();
      document.getElementById('statTents').textContent = Object.keys(tents).length;
      
      // بناء القوائم المنسدلة
      updateAllDropdowns();
      
      // عرض فارغ
      document.getElementById('resultsArea').innerHTML = 
        '<div class="empty-state">ابدأ بإدخال رقم الصوفا بيد أو استخدم الفلاتر</div>';
    }

    function onDataError(err) {
      document.getElementById('loadingState').innerHTML = 
        '<div class="empty-state">حدث خطأ في تحميل البيانات<br>' + err.message + '</div>';
    }

    // ══════ تحديث البيانات — مسح الكاش وإعادة التحميل ══════
    function forceRefresh() {
      document.getElementById('resultsArea').innerHTML = 
        '<div class="loading-state"><div class="spinner"></div><div class="loading-text">جاري تحديث البيانات...</div></div>';
      document.getElementById('resultsHeader').style.display = 'none';
      google.script.run
        .withSuccessHandler(function(data) {
          onDataLoaded(data);
          clearAllFilters();
        })
        .withFailureHandler(onDataError)
        .refreshData();
    }

    // ══════ البحث الرئيسي — صوفا بيد أولاً ══════
    function onMainSearch() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(function() {
        var q = document.getElementById('mainSearch').value.trim();
        if (!q) {
          applyFilters();
          return;
        }
        
        // مسح الفلاتر المتقدمة عند البحث الرئيسي
        clearDropdowns();
        
        var qUpper = q.toUpperCase();
        var qLower = q.toLowerCase();
        
        _filteredData = _allData.filter(function(p) {
          // أولوية 1: رقم الصوفا بيد (مطابقة جزئية)
          if (String(p[K.SOFA]).indexOf(q) > -1) return true;
          // أولوية 2: رقم الجواز
          if (String(p[K.PASSPORT]).toUpperCase().indexOf(qUpper) > -1) return true;
          // أولوية 3: ApplicantId
          if (String(p[K.APPLICANT_ID]).indexOf(q) > -1) return true;
          // أولوية 4: الاسم
          if (String(p[K.NAME]).toLowerCase().indexOf(qLower) > -1) return true;
          // أولوية 5: رقم الخيمة
          if (String(p[K.TENT]).indexOf(q) > -1) return true;
          return false;
        });
        
        renderResults();
      }, 400);
    }

    // ══════ الفلاتر المتتابعة (Cascading) ══════
    function onFilterChange() {
      // مسح البحث الرئيسي عند استخدام الفلاتر
      document.getElementById('mainSearch').value = '';
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(function() {
        applyFilters();
      }, 300);
    }

    function applyFilters() {
      var filters = getActiveFilters();
      
      // فلترة البيانات
      _filteredData = _allData.filter(function(p) {
        if (filters.camp && p[K.CAMP] !== filters.camp) return false;
        if (filters.nationality && p[K.NATIONALITY] !== filters.nationality) return false;
        if (filters.residence && p[K.RESIDENCE] !== filters.residence) return false;
        if (filters.guide && p[K.GUIDE] !== filters.guide) return false;
        if (filters.tent && p[K.TENT] !== filters.tent) return false;
        if (filters.applicantId && String(p[K.APPLICANT_ID]).indexOf(filters.applicantId) === -1) return false;
        return true;
      });
      
      // تحديث القوائم المنسدلة (كل قائمة ترى فلترة بدونها)
      updateAllDropdowns(filters);
      
      // عرض Chips
      renderChips(filters);
      
      // عرض النتائج
      var hasActiveFilter = Object.values(filters).some(function(v) { return v; });
      if (hasActiveFilter) {
        renderResults();
      } else {
        document.getElementById('resultsHeader').style.display = 'none';
        document.getElementById('resultsArea').innerHTML = 
          '<div class="empty-state">ابدأ بإدخال رقم الصوفا بيد أو استخدم الفلاتر</div>';
      }
    }

    function getActiveFilters() {
      return {
        camp: gv('fCamp'),
        nationality: gv('fNationality'),
        residence: gv('fResidence'),
        guide: gv('fGuide'),
        tent: gv('fTent'),
        applicantId: gv('fApplicantId').trim()
      };
    }

    // ══════ تحديث القوائم المنسدلة المتتابعة ══════
    function updateAllDropdowns(activeFilters) {
      var filters = activeFilters || getActiveFilters();
      var dropdowns = ['camp', 'nationality', 'residence', 'guide', 'tent'];
      
      dropdowns.forEach(function(key) {
        var filterKey = key === 'camp' ? K.CAMP :
                        key === 'nationality' ? K.NATIONALITY :
                        key === 'residence' ? K.RESIDENCE :
                        key === 'guide' ? K.GUIDE : K.TENT;
        
        // فلترة بكل الفلاتر ماعدا الحالي
        var subset = _allData.filter(function(p) {
          if (key !== 'camp' && filters.camp && p[K.CAMP] !== filters.camp) return false;
          if (key !== 'nationality' && filters.nationality && p[K.NATIONALITY] !== filters.nationality) return false;
          if (key !== 'residence' && filters.residence && p[K.RESIDENCE] !== filters.residence) return false;
          if (key !== 'guide' && filters.guide && p[K.GUIDE] !== filters.guide) return false;
          if (key !== 'tent' && filters.tent && p[K.TENT] !== filters.tent) return false;
          if (filters.applicantId && String(p[K.APPLICANT_ID]).indexOf(filters.applicantId) === -1) return false;
          return true;
        });
        
        // جمع القيم الفريدة + العدد
        var counts = {};
        subset.forEach(function(p) {
          var val = String(p[filterKey]).trim();
          if (val) counts[val] = (counts[val] || 0) + 1;
        });
        
        // ترتيب
        var options = Object.keys(counts).sort(function(a, b) {
          if (key === 'tent') {
            // ترتيب الخيام رقمياً
            var na = a.replace(/[^0-9]/g, '');
            var nb = b.replace(/[^0-9]/g, '');
            return parseInt(na || 0) - parseInt(nb || 0);
          }
          return a.localeCompare(b, 'ar');
        });
        
        var elId = 'f' + key.charAt(0).toUpperCase() + key.slice(1);
        var el = document.getElementById(elId);
        var currentVal = el.value;
        
        el.innerHTML = '<option value="">الكل (' + subset.length + ')</option>';
        options.forEach(function(opt) {
          var selected = (opt === currentVal) ? ' selected' : '';
          el.innerHTML += '<option value="' + escHtml(opt) + '"' + selected + '>' + 
                          escHtml(opt) + ' (' + counts[opt] + ')</option>';
        });
        
        // تلوين القائمة النشطة
        el.classList.toggle('active', !!el.value);
      });
    }

    // ══════ عرض النتائج ══════
    function renderResults() {
      var area = document.getElementById('resultsArea');
      var header = document.getElementById('resultsHeader');
      
      if (_filteredData.length === 0) {
        header.style.display = 'none';
        area.innerHTML = '<div class="empty-state">لا توجد نتائج</div>';
        return;
      }
      
      var showWarning = _filteredData.length > MAX_RESULTS;
      var display = _filteredData.slice(0, MAX_RESULTS);
      
      header.style.display = 'block';
      document.getElementById('resultCount').textContent = _filteredData.length;
      
      var html = '';
      if (showWarning) {
        html += '<div class="warning-msg">عرض أول ' + MAX_RESULTS + ' نتيجة من ' + _filteredData.length + ' — استخدم الفلاتر لتضييق البحث</div>';
      }
      
      display.forEach(function(p) {
        var isMale = isMaleGender(p[K.GENDER]);
        var genderClass = isMale ? 'male' : 'female';
        var genderText = isMale ? 'رجال' : 'نساء';
        var tent = escHtml(String(p[K.TENT]));
        var camp = escHtml(String(p[K.CAMP]));
        var sofa = escHtml(String(p[K.SOFA]));
        
        html += '<div class="card">' +
          '<div class="card-tent-header ' + genderClass + '">' +
            '<div class="tent-number">' + tent + '</div>' +
            '<div class="tent-sofa-badge">' + sofa + '</div>' +
            '<div class="tent-gender">' +
              '<div class="tent-gender-label">' + genderText + '</div>' +
              '<div class="tent-camp-label">' + camp + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-name">' + escHtml(String(p[K.NAME])) + '</div>' +
            '<div class="card-info">' +
              '<div class="card-info-item"><span class="card-info-label">الجواز</span><span class="card-info-value" dir="ltr" style="text-align:right">' + escHtml(String(p[K.PASSPORT])) + '</span></div>' +
              '<div class="card-info-item"><span class="card-info-label">الجنسية</span><span class="card-info-value">' + escHtml(String(p[K.NATIONALITY])) + '</span></div>' +
              '<div class="card-info-item"><span class="card-info-label">الإقامة</span><span class="card-info-value">' + escHtml(String(p[K.RESIDENCE])) + '</span></div>' +
              '<div class="card-info-item"><span class="card-info-label">المرشد</span><span class="card-info-value">' + escHtml(String(p[K.GUIDE])) + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<button class="btn-tent-details" onclick="openTentModal(\'' + escAttr(tent) + '\')">عرض كل حجاج الخيمة</button>' +
          '</div>' +
        '</div>';
      });
      
      area.innerHTML = html;
    }

    // ══════ Modal تفاصيل الخيمة ══════
    function openTentModal(tentNumber) {
      var pilgrims = _allData.filter(function(p) {
        return String(p[K.TENT]) === tentNumber;
      });
      
      if (pilgrims.length === 0) return;
      
      var first = pilgrims[0];
      var isMale = isMaleGender(first[K.GENDER]);
      var genderClass = isMale ? 'male' : 'female';
      
      document.getElementById('modalTentBadge').textContent = tentNumber;
      document.getElementById('modalTentBadge').className = 'modal-tent-badge ' + genderClass;
      document.getElementById('modalTentGender').textContent = isMale ? 'رجال' : 'نساء';
      document.getElementById('modalTentCamp').textContent = first[K.CAMP];
      document.getElementById('modalTentCount').textContent = pilgrims.length;
      
      var html = '';
      pilgrims.forEach(function(p) {
        html += '<div class="modal-pilgrim">' +
          '<div class="modal-pilgrim-info">' +
            '<div class="modal-pilgrim-name">' + escHtml(String(p[K.NAME])) + '</div>' +
            '<div class="modal-pilgrim-detail">' + escHtml(String(p[K.PASSPORT])) + ' — ' + escHtml(String(p[K.NATIONALITY])) + '</div>' +
          '</div>' +
          '<div class="modal-pilgrim-sofa">' + escHtml(String(p[K.SOFA])) + '</div>' +
        '</div>';
      });
      
      document.getElementById('modalList').innerHTML = html;
      document.getElementById('tentModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeTentModal(event) {
      if (event.target === document.getElementById('tentModal')) {
        closeTentModalDirect();
      }
    }
    function closeTentModalDirect() {
      document.getElementById('tentModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    // ══════ Chips ══════
    function renderChips(filters) {
      var bar = document.getElementById('chipsBar');
      var labels = {
        camp: 'المخيم', nationality: 'الجنسية', residence: 'الإقامة',
        guide: 'المرشد', tent: 'الخيمة', applicantId: 'ApplicantId'
      };
      
      var html = '';
      Object.keys(filters).forEach(function(key) {
        if (filters[key]) {
          html += '<div class="chip">' +
            labels[key] + ': ' + escHtml(filters[key]) +
            '<div class="chip-close" onclick="removeFilter(\'' + key + '\')">✕</div>' +
          '</div>';
        }
      });
      bar.innerHTML = html;
    }

    function removeFilter(key) {
      var map = {
        camp: 'fCamp', nationality: 'fNationality', residence: 'fResidence',
        guide: 'fGuide', tent: 'fTent', applicantId: 'fApplicantId'
      };
      var el = document.getElementById(map[key]);
      if (el.tagName === 'SELECT') el.value = '';
      else el.value = '';
      applyFilters();
    }

    // ══════ أدوات ══════
    function toggleFilters() {
      var panel = document.getElementById('filtersPanel');
      var toggle = document.getElementById('filtersToggle');
      panel.classList.toggle('open');
      toggle.classList.toggle('open');
    }

    function clearAllFilters() {
      ['fCamp', 'fNationality', 'fResidence', 'fGuide', 'fTent'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
      document.getElementById('fApplicantId').value = '';
      document.getElementById('mainSearch').value = '';
      applyFilters();
    }

    function clearDropdowns() {
      ['fCamp', 'fNationality', 'fResidence', 'fGuide', 'fTent'].forEach(function(id) {
        document.getElementById(id).value = '';
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById('fApplicantId').value = '';
      document.getElementById('chipsBar').innerHTML = '';
    }

    function isMaleGender(g) {
      var val = String(g).trim().toLowerCase();
      return val === 'male' || val === 'ذكر' || val === 'm';
    }

    function gv(id) {
      var el = document.getElementById(id);
      return el ? el.value : '';
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }
  </script>

</body>
