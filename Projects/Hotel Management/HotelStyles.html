<style>
/* ============================================================
   HOTEL MANAGEMENT APP — STYLES
   ============================================================ */

/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Kufi Arabic', 'Segoe UI', Tahoma, sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  direction: rtl;
}

/* ========== HEADER ========== */
#appHeader {
  background: linear-gradient(135deg, #0f172a 0%, #1a2744 50%, #0d3320 100%);
  border-bottom: 1px solid rgba(110,231,183,0.15);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo { font-size: 22px; }

.title { font-size: 16px; font-weight: 700; color: #e2e8f0; }
.subtitle { font-size: 10px; color: #6ee7b7; font-weight: 600; }

.header-left {
  display: flex;
  gap: 8px;
  align-items: center;
}

#roleSelector {
  background: #1e293b;
  color: #6ee7b7;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
}

/* ========== HOTEL SELECTOR ========== */
#hotelSelector {
  background: #111827;
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid #1e293b;
  align-items: center;
}

.city-toggle {
  display: flex;
  gap: 4px;
  background: #1e293b;
  border-radius: 10px;
  padding: 3px;
}

.city-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  font-family: inherit;
  transition: all 0.2s;
  background: transparent;
  color: #94a3b8;
  white-space: nowrap;
}

.city-btn.active[data-city="madinah"] { background: #065f46; color: #fff; }
.city-btn.active[data-city="makkah"] { background: #7c2d12; color: #fff; }
.city-btn.active[data-city="makkahShifting"] { background: #4c1d95; color: #fff; }

#hotelDropdown {
  flex: 1;
  min-width: 200px;
  background: #1e293b;
  color: #e2e8f0;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
}

/* ========== TAB NAVIGATION ========== */
#tabNav {
  display: flex;
  gap: 2px;
  padding: 8px 20px;
  background: #111827;
  border-bottom: 1px solid #1e293b;
  overflow-x: auto;
}

.tab-btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  transition: all 0.2s;
  background: transparent;
  color: #64748b;
  font-family: inherit;
}

.tab-btn.active {
  background: #065f46;
  color: #6ee7b7;
}

.tab-btn:hover:not(.active) {
  background: #1e293b;
  color: #94a3b8;
}

/* ========== TAB CONTENT ========== */
.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active { display: block; }

/* ========== STATS BAR ========== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.stat-card {
  border-radius: 12px;
  padding: 12px 16px;
}

.stat-label {
  font-size: 10px;
  color: #94a3b8;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 22px;
  font-weight: 800;
}

/* ========== FILTER BAR ========== */
.filter-bar {
  background: #1e293b;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-bar input,
.filter-bar select {
  background: #0f172a;
  color: #e2e8f0;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: inherit;
}

.filter-bar input {
  flex: 1;
  min-width: 200px;
}

.filter-bar select {
  min-width: 120px;
}

/* ========== BUTTONS ========== */
.btn-primary {
  background: #065f46;
  color: #6ee7b7;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-primary:hover { background: #047857; }

.btn-checkin {
  background: #065f46;
  color: #6ee7b7;
  border: none;
  border-radius: 8px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-checkin:hover { background: #047857; }

.btn-confirm {
  background: #6ee7b7;
  color: #064e3b;
  border: none;
  border-radius: 10px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
}

.btn-export {
  background: #1e3a5f;
  color: #60a5fa;
  border: 1px solid #3b82f6;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-export:hover { background: #1e40af; }

/* ========== PILGRIM CARD ========== */
.pilgrim-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 14px;
  border: 1px solid #334155;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.pilgrim-card.early-arrival {
  background: linear-gradient(135deg, #1e293b 80%, #7f1d1d 100%);
}

.pilgrim-card.late-arrival {
  background: linear-gradient(135deg, #1e293b 80%, #7c2d12 100%);
  border-color: rgba(249, 115, 22, 0.2);
}

.pilgrim-card.delayed {
  border-color: rgba(248, 113, 113, 0.2);
}

.pilgrim-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 6px;
}

.pilgrim-name {
  font-weight: 700;
  font-size: 14px;
  color: #e2e8f0;
}

.pilgrim-group {
  font-size: 11px;
  color: #64748b;
  margin-right: 8px;
}

.pilgrim-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  font-size: 11px;
  color: #94a3b8;
}

.pilgrim-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.room-input {
  background: #0f172a;
  color: #e2e8f0;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  width: 100px;
  font-family: inherit;
}

.room-assigned {
  margin-top: 8px;
  font-size: 12px;
  color: #6ee7b7;
  font-weight: 600;
}

/* ========== BADGES ========== */
.badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  display: inline-block;
}

.badge-arrived { background: #064e3b; color: #6ee7b7; }
.badge-pending { background: #78350f; color: #fcd34d; }
.badge-delayed { background: #7f1d1d; color: #fca5a5; }

.badge-early {
  background: #7f1d1d;
  color: #fca5a5;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}

.badge-late {
  background: #7c2d12;
  color: #fb923c;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}

.badge-dept-early { background: #7f1d1d; color: #fca5a5; }
.badge-dept-late { background: #78350f; color: #fcd34d; }
.badge-dept-normal { background: #064e3b; color: #6ee7b7; }

/* ========== SECTION CARDS ========== */
.section-card {
  background: linear-gradient(135deg, #1e293b, #1a2744);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid #334155;
}

.section-title {
  font-size: 14px;
  font-weight: 700;
  color: #6ee7b7;
  margin-bottom: 12px;
}

.mt-20 { margin-top: 20px; }

/* ========== ALERT CARD ========== */
.alert-card {
  background: linear-gradient(135deg, #7f1d1d 0%, #1e293b 100%);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid rgba(248, 113, 113, 0.2);
  margin-bottom: 16px;
}

.alert-title {
  font-size: 13px;
  font-weight: 700;
  color: #fca5a5;
  margin-bottom: 10px;
}

/* ========== FLIGHT CARD ========== */
.flight-card {
  background: #0f172a;
  border-radius: 10px;
  padding: 10px 14px;
  border: 1px solid #334155;
  min-width: 180px;
}

.flight-number {
  font-weight: 700;
  color: #e2e8f0;
  font-size: 13px;
}

.flight-count {
  color: #6ee7b7;
  font-size: 11px;
  font-weight: 600;
}

.flight-expected {
  font-size: 12px;
  color: #fbbf24;
  font-weight: 700;
  margin-top: 4px;
}

/* ========== SHARED PILGRIM (ROOMING) ========== */
.shared-pilgrim {
  background: #1e293b;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border: 1px solid #334155;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.15s;
  margin-bottom: 6px;
}

.shared-pilgrim.selected {
  background: #1e3a5f;
  border: 2px solid #60a5fa;
}

.checkbox-icon {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: #334155;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  flex-shrink: 0;
}

.shared-pilgrim.selected .checkbox-icon {
  background: #3b82f6;
}

.gender-section-title {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 8px;
  display: inline-block;
  margin-bottom: 8px;
  margin-top: 12px;
}

.gender-male { background: #1e3a5f; color: #60a5fa; }
.gender-female { background: #5b1a3a; color: #f472b6; }

/* ========== ROOM GROUP ========== */
.room-group {
  background: #064e3b;
  border-radius: 12px;
  padding: 14px;
  border: 1px solid rgba(110,231,183,0.2);
  margin-bottom: 8px;
}

/* ========== ACTION BAR ========== */
.action-bar {
  position: sticky;
  bottom: 12px;
  background: #065f46;
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #6ee7b7;
  z-index: 50;
}

.action-bar span {
  color: #6ee7b7;
  font-weight: 700;
  font-size: 13px;
}

/* ========== DEPARTURE CARD ========== */
.departure-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 14px;
  border: 1px solid #334155;
  margin-bottom: 8px;
}

.departure-card.early {
  border-color: rgba(248, 113, 113, 0.2);
}

.departure-card.late {
  border-color: rgba(251, 191, 36, 0.2);
}

/* ========== UPCOMING DAY CARD ========== */
.day-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid #334155;
  text-align: center;
}

.day-date { font-size: 11px; color: #64748b; }
.day-count { font-size: 24px; font-weight: 800; color: #f97316; margin: 4px 0; }
.day-dest { font-size: 10px; color: #94a3b8; }

/* ========== INVENTORY TABLE ========== */
.inventory-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 11px;
}

.inventory-table th {
  background: #1e293b;
  color: #6ee7b7;
  padding: 10px 12px;
  text-align: center;
  position: sticky;
  top: 0;
}

.inventory-table th:first-child {
  text-align: right;
  border-radius: 10px 0 0 0;
}

.inventory-table th:last-child {
  border-radius: 0 10px 0 0;
}

.inventory-table td {
  padding: 10px 12px;
  text-align: center;
}

.inventory-table tr:nth-child(even) td { background: #111827; }
.inventory-table tr:nth-child(odd) td { background: #0f172a; }

.inventory-table td:first-child {
  font-weight: 700;
  color: #e2e8f0;
  text-align: right;
}

.pct-bar {
  background: #0f172a;
  border-radius: 20px;
  overflow: hidden;
  height: 18px;
  position: relative;
}

.pct-fill {
  height: 100%;
  border-radius: 20px;
  transition: width 0.5s;
}

.pct-text {
  position: absolute;
  top: 1px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 700;
  color: #e2e8f0;
}

/* ========== DASHBOARD TABLE ========== */
.dashboard-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 11px;
  overflow-x: auto;
}

.dashboard-table th {
  background: #1e293b;
  color: #6ee7b7;
  padding: 10px 12px;
}

.dashboard-table td {
  padding: 10px 12px;
  text-align: center;
}

.dashboard-table tr:nth-child(even) td { background: #111827; }
.dashboard-table tr:nth-child(odd) td { background: #0f172a; }

.dashboard-table td:first-child {
  font-weight: 600;
  color: #e2e8f0;
  text-align: right;
}

.pct-badge {
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.pct-good { background: #064e3b; color: #6ee7b7; }
.pct-warn { background: #78350f; color: #fbbf24; }
.pct-bad { background: #7f1d1d; color: #fca5a5; }

/* ========== LOADING ========== */
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(10, 15, 26, 0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #334155;
  border-top: 3px solid #6ee7b7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  margin-top: 12px;
  color: #6ee7b7;
  font-size: 13px;
  font-weight: 600;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  background: #065f46;
  color: #6ee7b7;
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  z-index: 2000;
  transition: bottom 0.3s ease;
  border: 1px solid #6ee7b7;
}

.toast.show { bottom: 30px; }
.toast.error { background: #7f1d1d; color: #fca5a5; border-color: #f87171; }

/* ========== FOOTER ========== */
footer {
  text-align: center;
  padding: 20px 20px 30px;
  font-size: 10px;
  color: #334155;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .pilgrim-details { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; }
  .filter-bar input, .filter-bar select { min-width: 100%; }
  .city-toggle { flex-wrap: wrap; }
  #tabNav { gap: 0; }
  .tab-btn { padding: 8px 10px; font-size: 10px; }
}
</style>
