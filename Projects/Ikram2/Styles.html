<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Cairo', sans-serif;
    background: #f5f7f5;
    min-height: 100vh;
  }
  
  body.rtl {
    direction: rtl;
    text-align: right;
  }
  
  body.ltr {
    direction: ltr;
    text-align: left;
  }
  
  /* Header */
  .header {
    background: linear-gradient(135deg, #3c7b44, #2d5a33);
    color: #fff;
    padding: 15px 20px;
    text-align: center;
    position: relative;
  }
  
  .header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }
  
  .header-logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  
  .header-text {
    text-align: center;
  }
  
  .header h1 {
    font-size: 1.3rem;
    margin-bottom: 5px;
  }
  
  .header p {
    opacity: .9;
    font-size: .85rem;
  }
  
  .lang-select {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #fff;
    border: 2px solid #fff;
    color: #2d5a33;
    padding: 5px 10px;
    border-radius: 5px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  
  body.ltr .lang-select {
    left: auto;
    right: 10px;
  }
  
  /* Stats Bar */
  .stats-bar {
    background: #fff;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    border-bottom: 3px solid #3c7b44;
  }
  
  .stat-item {
    text-align: center;
    min-width: 120px;
  }
  
  .stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: #3c7b44;
  }
  
  .stat-label {
    font-size: .75rem;
    color: #666;
    margin-top: 2px;
  }
  
  /* Tabs */
  .tabs-container {
    background: linear-gradient(135deg, #3c7b44, #2d5a33);
    padding: 10px 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  
  .tab-btn {
    background: transparent;
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    padding: 10px 30px;
    border-radius: 25px;
    font-family: inherit;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .3s;
  }
  
  .tab-btn:hover {
    background: rgba(255,255,255,0.1);
  }
  
  .tab-btn.active {
    background: #fff;
    color: #2d5a33;
    border-color: #fff;
  }
  
  /* Container */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 15px;
  }
  
  /* Filters */
  .filters {
    background: #fff;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  
  .filters-title {
    color: #3c7b44;
    font-size: 1rem;
    margin-bottom: 12px;
  }
  
  .filters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  
  .filter-group label {
    display: block;
    font-size: .75rem;
    color: #666;
    margin-bottom: 3px;
  }
  
  .filter-group select,
  .filter-group input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-family: inherit;
    font-size: .85rem;
  }
  
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: #fff8e1;
    border-radius: 6px;
  }
  
  .checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #3c7b44;
  }
  
  /* Buttons */
  .buttons {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    font-size: .9rem;
    transition: all .2s;
  }
  
  .btn:hover {
    transform: translateY(-1px);
  }
  
  .btn-primary {
    background: #3c7b44;
    color: #fff;
  }
  
  .btn-secondary {
    background: #e8e8e8;
    color: #333;
  }
  
  .btn-whatsapp {
    background: #25d366;
    color: #fff;
  }
  
  .btn-export {
    background: #1565c0;
    color: #fff;
  }
  
  .btn-print {
    background: #6c757d;
    color: #fff;
  }
  
  .btn-compare {
    background: #9c27b0;
    color: #fff;
  }
  
  /* Controls Bar */
  .controls-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
    padding: 10px;
    background: #fff;
    border-radius: 8px;
  }
  
  .sort-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .sort-group label {
    font-size: .8rem;
    color: #666;
  }
  
  .sort-group select {
    padding: 6px 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: inherit;
  }
  
  .results-count {
    background: #e8f5e9;
    padding: 8px 15px;
    border-radius: 20px;
  }
  
  .results-count strong {
    color: #3c7b44;
  }
  
  .auto-refresh {
    font-size: .75rem;
    color: #888;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  
  .auto-refresh .dot {
    width: 8px;
    height: 8px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
  
  /* Grids */
  .packages-grid,
  .pnr-grid,
  .hotel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 15px;
  }
  
  /* Cards */
  .card,
  .pnr-card,
  .hotel-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    transition: transform .2s;
  }
  
  .card:hover,
  .pnr-card:hover,
  .hotel-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 20px rgba(0,0,0,.12);
  }
  
  .card.sold-out {
    opacity: .65;
  }
  
  .card.selected {
    border: 3px solid #9c27b0;
  }
  
  .card-header {
    background: linear-gradient(135deg, #3c7b44, #2d5a33);
    color: #fff;
    padding: 15px;
    position: relative;
    min-height: 90px;
  }
  
  .card-header h3 {
    font-size: .95rem;
    margin-bottom: 8px;
  }
  
  .card-category {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #c9a227;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: .7rem;
  }
  
  .sold-out-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #c62828;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: .7rem;
    font-weight: 600;
  }
  
  body.ltr .card-category {
    left: auto;
    right: 8px;
  }
  
  body.ltr .sold-out-badge {
    right: auto;
    left: 8px;
  }
  
  .card-countries {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }
  
  .country-tag {
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: .7rem;
    border: 1px solid rgba(255,255,255,0.3);
  }
  
  .card-select {
    position: absolute;
    top: 40px;
    left: 8px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #9c27b0;
  }
  
  body.ltr .card-select {
    left: auto;
    right: 8px;
  }
  
  .card-body {
    padding: 12px;
  }
  
  .info-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  
  .badge {
    background: #f0f4f0;
    padding: 4px 8px;
    border-radius: 5px;
    font-size: .75rem;
    color: #555;
  }
  
  .badge.makkah {
    background: #fff3e0;
    color: #e65100;
  }
  
  /* Sales Section */
  .sales-section {
    margin: 10px 0;
    padding: 10px;
    background: linear-gradient(135deg, #f8f9fa, #e9ecef);
    border-radius: 8px;
    border: 1px solid #dee2e6;
  }
  
  .sales-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  
  .sales-title {
    font-size: .85rem;
    color: #495057;
    font-weight: 600;
  }
  
  .sales-percent {
    font-size: 1rem;
    font-weight: 700;
    color: #3c7b44;
  }
  
  .sales-percent.high {
    color: #dc3545;
  }
  
  .sales-percent.medium {
    color: #fd7e14;
  }
  
  .progress-bar {
    height: 10px;
    background: #e0e0e0;
    border-radius: 5px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width .3s;
  }
  
  .progress-fill.low {
    background: linear-gradient(90deg, #28a745, #20c997);
  }
  
  .progress-fill.medium {
    background: linear-gradient(90deg, #fd7e14, #ffc107);
  }
  
  .progress-fill.high {
    background: linear-gradient(90deg, #dc3545, #e91e63);
  }
  
  .progress-fill.full {
    background: #6c757d;
  }
  
  .sales-stats {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: .8rem;
    color: #495057;
  }
  
  .sales-stats span {
    font-weight: 700;
  }
  
  /* Sections */
  .section {
    border-top: 1px solid #eee;
    padding-top: 10px;
    margin-top: 10px;
  }
  
  .section-title {
    font-size: .8rem;
    color: #3c7b44;
    margin-bottom: 8px;
    font-weight: 600;
  }
  
  /* Hotel Items */
  .hotel-item {
    background: #f8faf8;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
  }
  
  .hotel-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    flex-wrap: wrap;
  }
  
  .hotel-city {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 600;
  }
  
  .hotel-city.makkah {
    background: #fff3e0;
    color: #e65100;
  }
  
  .hotel-name {
    font-size: .85rem;
    color: #333;
  }
  
  .hotel-dates {
    font-size: .75rem;
    color: #666;
    font-weight: 600;
    background: #e3f2fd;
    padding: 2px 8px;
    border-radius: 4px;
  }
  
  .hotel-nights {
    font-size: .7rem;
    color: #1565c0;
    font-weight: 700;
    background: #bbdefb;
    padding: 2px 6px;
    border-radius: 4px;
  }
  
  .hotel-location {
    background: #1565c0;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: .7rem;
    text-decoration: none;
    font-weight: 600;
  }
  
  /* ==================== Room Availability Badges ==================== */
  .room-badges {
    display: flex;
    gap: 4px;
    margin: 4px 0 8px;
    padding: 4px 8px;
    flex-wrap: wrap;
  }
  
  .room-badge {
    padding: 2px 8px;
    border-radius: 12px;
    font-size: .7rem;
    font-weight: 600;
  }
  
  .room-available {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  
  .room-unavailable {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
  }
  
  .room-unconfirmed {
    background: #fffde7;
    color: #f57f17;
    border: 1px solid #fff176;
  }
  
  .room-last-update {
    font-size: .65rem;
    color: #999;
    text-align: left;
    padding: 2px 8px;
    margin-top: 2px;
  }
  
  body.rtl .room-last-update {
    text-align: right;
  }
  
  /* ==================== Target Countries ==================== */
  .target-countries {
    background: #f3e5f5;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ce93d8;
  }
  
  .target-countries-title {
    font-size: .8rem;
    color: #7b1fa2;
    font-weight: 600;
    margin-bottom: 6px;
  }
  
  .target-countries-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  
  .target-country-tag {
    background: #e1bee7;
    color: #4a148c;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: .7rem;
    font-weight: 600;
    border: 1px solid #ce93d8;
  }
  
  /* City Groups */
  .city-group {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
  }
  
  .city-group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    color: #fff;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  
  .city-group-name {
    font-weight: 700;
  }
  
  .city-group-stats {
    display: flex;
    gap: 15px;
    font-size: .8rem;
  }
  
  .flight-item-simple {
    background: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e0e0e0;
  }
  
  .flight-pnr-small {
    background: #e3f2fd;
    color: #1565c0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 700;
  }
  
  .flight-airline-small {
    font-size: .75rem;
    color: #555;
  }
  
  .flight-stats-small {
    display: flex;
    gap: 10px;
    font-size: .75rem;
    align-items: center;
  }
  
  .progress-bar-small {
    width: 60px;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    overflow: hidden;
  }
  
  /* Card Footer */
  .card-footer {
    border-top: 2px solid #eee;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .price-box {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  
  .price-label {
    font-size: .7rem;
    color: #888;
  }
  
  .price {
    font-size: 1.4rem;
    color: #3c7b44;
    font-weight: 700;
  }
  
  .price span {
    font-size: .75rem;
  }
  
  .action-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: transform .2s;
  }
  
  .icon-btn:hover {
    transform: scale(1.1);
  }
  
  .btn-whatsapp-icon {
    background: #25d366;
    color: #fff;
  }
  
  .btn-email {
    background: #3c7b44;
    color: #fff;
  }
  
  .btn-copy {
    background: #6c757d;
    color: #fff;
  }
  
  .btn-book {
    background: linear-gradient(135deg, #c9a227, #b8860b);
    color: #fff;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: .85rem;
    font-weight: 600;
    width: auto;
    height: auto;
  }
  
  /* PNR Headers with Country Colors */
  .pnr-header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    color: #fff;
  }
  
  .pnr-header.italy { background: linear-gradient(135deg, #009246, #006030); }
  .pnr-header.australia { background: linear-gradient(135deg, #00008B, #000060); }
  .pnr-header.canada { background: linear-gradient(135deg, #FF0000, #cc0000); }
  .pnr-header.usa { background: linear-gradient(135deg, #3C3B6E, #2d2a52); }
  .pnr-header.switzerland { background: linear-gradient(135deg, #FF0000, #cc0000); }
  .pnr-header.austria { background: linear-gradient(135deg, #ED2939, #c41e2a); }
  .pnr-header.germany { background: linear-gradient(135deg, #000000, #333333); }
  .pnr-header.netherland { background: linear-gradient(135deg, #FF6600, #cc5200); }
  .pnr-header.france { background: linear-gradient(135deg, #0055A4, #003580); }
  .pnr-header.uk { background: linear-gradient(135deg, #012169, #001040); }
  .pnr-header.spain { background: linear-gradient(135deg, #C60B1E, #a00918); }
  .pnr-header.denmark { background: linear-gradient(135deg, #C8102E, #a00d25); }
  .pnr-header.belgium { background: linear-gradient(135deg, #FFD100, #ccaa00); color: #000; }
  .pnr-header.sweden { background: linear-gradient(135deg, #006AA7, #005586); }
  .pnr-header.southafrica { background: linear-gradient(135deg, #007749, #005c39); }
  .pnr-header.greece { background: linear-gradient(135deg, #0D5EAF, #0a4a8c); }
  .pnr-header.japan { background: linear-gradient(135deg, #BC002D, #960024); }
  .pnr-header.finland { background: linear-gradient(135deg, #003580, #002966); }
  .pnr-header.norway { background: linear-gradient(135deg, #BA0C2F, #950a26); }
  .pnr-header.default { background: linear-gradient(135deg, #1565c0, #0d47a1); }
  
  .pnr-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .pnr-code {
    font-size: 1rem;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 5px 12px;
    border-radius: 5px;
  }
  
  .pnr-country {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  
  .country-flag {
    font-size: 1.2rem;
  }
  
  .pnr-price {
    font-size: 1.1rem;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 5px 15px;
    border-radius: 20px;
  }
  
  .pnr-body {
    padding: 15px;
  }
  
  /* Flight Details */
  .flight-detail {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  
  .flight-detail-header {
    font-size: .85rem;
    color: #1565c0;
    font-weight: 600;
    margin-bottom: 10px;
  }
  
  .flight-route-detail {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  
  .flight-point {
    text-align: center;
  }
  
  .flight-point-code {
    font-size: 1.1rem;
    font-weight: 700;
    color: #333;
  }
  
  .flight-point-time {
    font-size: .85rem;
    color: #666;
    margin-top: 2px;
  }
  
  .flight-point-date {
    font-size: .7rem;
    color: #888;
    margin-top: 2px;
  }
  
  .flight-arrow {
    color: #3c7b44;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  
  /* Linked Packages */
  .pnr-linked-packages {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #eee;
  }
  
  .pnr-linked-title {
    font-size: .85rem;
    color: #1565c0;
    font-weight: 600;
    margin-bottom: 10px;
  }
  
  .linked-pkg-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    background: #f5f5f5;
    border-radius: 5px;
    margin-bottom: 5px;
  }
  
  .linked-pkg-name {
    font-size: .85rem;
