function getCountryInfo(c) {
  if (!c) return { flag: '🌍', color: 'default' };
  var trimmed = String(c).trim();
  if (countryData[trimmed]) return countryData[trimmed];
  for (var k in countryData) {
    if (trimmed.toLowerCase().indexOf(k.toLowerCase()) !== -1) return countryData[k];
  }
  return { flag: '🌍', color: 'default' };
}

// ==================== دوال مساعدة ====================
function gv(id) { 
  var e = document.getElementById(id); 
  return e ? e.value.trim() : ''; 
}

function sv(id, v) { 
  var e = document.getElementById(id); 
  if (e) e.value = v; 
}

function gc(id) { 
  var e = document.getElementById(id); 
  return e ? e.checked : false; 
}

function sc(id, v) { 
  var e = document.getElementById(id); 
  if (e) e.checked = v; 
}

function fmtN(n) { 
  return Number(n).toLocaleString('en-US'); 
}

function fillSelect(id, arr, allText) {
  var s = document.getElementById(id);
  if (!s) return;
  s.innerHTML = '<option value="">' + allText + '</option>';
  for (var i = 0; i < arr.length; i++) {
    var val = String(arr[i]).trim();
    if (val) s.innerHTML += '<option value="' + val + '">' + val + '</option>';
  }
}

function getUnique(arr, key) {
  var u = [];
  for (var i = 0; i < arr.length; i++) {
    var v = arr[i][key];
    if (v) {
      var trimmed = String(v).trim();
      if (trimmed && u.indexOf(trimmed) === -1) u.push(trimmed);
    }
  }
  return u.sort();
}

function getProgressClass(p) {
  if (p >= 100) return 'full';
  if (p >= 75) return 'high';
  if (p >= 50) return 'medium';
  return 'low';
}

function getHotelMapLink(ar, en) {
  for (var i = 0; i < allHotels.length; i++) {
    var h = allHotels[i];
    if ((ar && h.nameAr === ar) || (en && h.nameEn === en)) return h.mapLink || '';
  }
  return '';
}

/**
 * استخراج جميع الدول المستهدفة من كل الرحلات (بدون تكرار)
 */
function getAllTargetCountries() {
  var u = [];
  for (var i = 0; i < allFlights.length; i++) {
    var tc = allFlights[i].targetCountries;
    if (tc && tc.length > 0) {
      for (var j = 0; j < tc.length; j++) {
        var v = String(tc[j]).trim();
        if (v && u.indexOf(v) === -1) u.push(v);
      }
    }
  }
  return u.sort();
}

// ==================== التحميل والتهيئة ====================
document.addEventListener('DOMContentLoaded', function() {
  checkAuthStatus();
  updateUILanguage();
  loadData();
  setInterval(function() { 
    saveFilters(); 
    loadData(); 
  }, 30000);
});

function changeLang(lang) {
  currentLang = lang;
  document.body.className = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  updateUILanguage();
  restoreFilters();
  doSearch();
  doFlightsSearch();
  doHotelsSearch();
}

function loadData() {
  google.script.run
    .withSuccessHandler(function(json) {
      var data = JSON.parse(json);
      allPackages = data.packages || [];
      allFlights = data.flights || [];
      allHotels = data.hotels || [];
      document.getElementById('statPackages').textContent = fmtN(data.stats.availablePackages);
      document.getElementById('statPilgrims').textContent = fmtN(data.stats.remainingPilgrims);
      document.getElementById('statBookingPercent').textContent = data.stats.bookingPercent + '%';
      document.getElementById('statTickets').textContent = fmtN(data.stats.remainingTickets);
      initFilters();
      initFlightsFilters();
      initHotelsFilters();
      restoreFilters();
      doSearch();
      doFlightsSearch();
      doHotelsSearch();
    })
    .withFailureHandler(function(err) {
      console.error('Load error:', err);
      document.getElementById('resultsArea').innerHTML = '<div class="error-box">Error loading data</div>';
    })
    .getAllData();
}

// ==================== نظام المصادقة ====================
function checkAuthStatus() {
  var stored = localStorage.getItem('authExpiry');
  if (stored && parseInt(stored) > Date.now()) {
    isAuthenticated = true;
    authExpiry = parseInt(stored);
  } else {
    isAuthenticated = false;
    localStorage.removeItem('authExpiry');
  }
}

function setAuthenticated() {
  isAuthenticated = true;
  authExpiry = Date.now() + (60 * 60 * 1000);
  localStorage.setItem('authExpiry', authExpiry.toString());
}

function showPasswordModal(targetTab) {
  var t = T[currentLang];
  document.getElementById('passwordModalTitle').textContent = t.passwordTitle;
  document.getElementById('passwordError').textContent = t.passwordError;
  document.getElementById('passwordError').style.display = 'none';
  document.getElementById('passwordInput').value = '';
  document.getElementById('passwordSubmitBtn').textContent = t.passwordSubmit;
  document.getElementById('passwordCancelBtn').textContent = t.passwordCancel;
  document.getElementById('passwordModal').dataset.targetTab = targetTab;
  document.getElementById('passwordModal').classList.add('show');
  document.getElementById('passwordInput').focus();
}

function closePasswordModal() {
  document.getElementById('passwordModal').classList.remove('show');
}

function submitPassword() {
  var entered = document.getElementById('passwordInput').value;
  var targetTab = document.getElementById('passwordModal').dataset.targetTab;
  google.script.run
    .withSuccessHandler(function(correct) {
      if (entered === correct) {
        setAuthenticated();
        closePasswordModal();
        switchTabDirect(targetTab);
      } else {
        document.getElementById('passwordError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('passwordError').style.display = 'block';
    })
    .getPassword();
}

// ==================== التبويبات ====================
function switchTab(tab) {
 if (tab === 'hotels' && !isAuthenticated) {
    checkAuthStatus();
    if (!isAuthenticated) { 
      showPasswordModal(tab); 
      return; 
    }
  }
  switchTabDirect(tab);
}

function switchTabDirect(tab) {
  var tabs = ['packages', 'flights', 'hotels'];
  for (var i = 0; i < tabs.length; i++) {
    var btn = document.getElementById('tab' + tabs[i].charAt(0).toUpperCase() + tabs[i].slice(1));
    var content = document.getElementById('content' + tabs[i].charAt(0).toUpperCase() + tabs[i].slice(1));
    if (tabs[i] === tab) { 
      btn.classList.add('active'); 
      content.classList.add('active'); 
    } else { 
      btn.classList.remove('active'); 
      content.classList.remove('active'); 
    }
  }
}

// ==================== حفظ واستعادة الفلاتر ====================
function saveFilters() {
  savedFilters.packages = { 
    country: gv('fCountry'), 
    city: gv('fCity'), 
    airline: gv('fAirline'), 
    category: gv('fCategory'), 
    startCity: gv('fStartCity'),

    salesPercent: gv('fSalesPercent'), 
    package: gv('fPackage'), 
    pnr: gv('fPNR'), 
    showSoldOut: gc('showSoldOut'), 
    sortBy: gv('sortBy') 
  };
  savedFilters.flights = { 
    country: gv('fFlightCountry'), 
    city: gv('fFlightCity'), 
    airline: gv('fFlightAirline'), 
    pnr: gv('fFlightPNR'), 
    package: gv('fFlightPackage'), 
    targetCountry: gv('fFlightTargetCountry'),
    showSoldOut: gc('showSoldOutFlights') 
  };
  savedFilters.hotels = { 
    city: gv('fHotelCity'), 
    name: gv('fHotelName'), 
    package: gv('fHotelPackage') 
  };
}

function restoreFilters() {
  if (savedFilters.packages.country !== undefined) {
    sv('fCountry', savedFilters.packages.country); 
    sv('fCity', savedFilters.packages.city); 
    sv('fAirline', savedFilters.packages.airline);
    sv('fCategory', savedFilters.packages.category); 
    sv('fStartCity', savedFilters.packages.startCity); 
    sv('fHotel', savedFilters.packages.hotel);
    sv('fSalesPercent', savedFilters.packages.salesPercent); 
    sv('fPackage', savedFilters.packages.package); 
    sv('fPNR', savedFilters.packages.pnr);
    sc('showSoldOut', savedFilters.packages.showSoldOut); 
    sv('sortBy', savedFilters.packages.sortBy);
  }
  if (savedFilters.flights.country !== undefined) {
    sv('fFlightCountry', savedFilters.flights.country); 
    sv('fFlightCity', savedFilters.flights.city); 
    sv('fFlightAirline', savedFilters.flights.airline);
    sv('fFlightPNR', savedFilters.flights.pnr); 
    sv('fFlightPackage', savedFilters.flights.package); 
    sv('fFlightTargetCountry', savedFilters.flights.targetCountry);
    sc('showSoldOutFlights', savedFilters.flights.showSoldOut);
  }
  if (savedFilters.hotels.city !== undefined) {
    sv('fHotelCity', savedFilters.hotels.city); 
    sv('fHotelName', savedFilters.hotels.name); 
    sv('fHotelPackage', savedFilters.hotels.package);
  }
}
