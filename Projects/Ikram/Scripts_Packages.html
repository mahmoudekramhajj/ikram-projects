<script>
// ══════════════════════════════════════════════════════════════
// Scripts_Packages.html - منطق الباقات والبحث والمقارنة
// الإصدار 27.0 - توفر الغرف + إخفاء التذاكر المكتملة
// ══════════════════════════════════════════════════════════════

// ==================== فلاتر الباقات ====================
function initFilters() {
  var t = T[currentLang];
  var countries = [], cities = [], airlines = [];
  
  for (var i = 0; i < allFlights.length; i++) {
    var f = allFlights[i];
    var country = String(f.country || '').trim();
    var city = String(f.city || '').trim();
    var airline = String(f.airline || '').trim();
    if (country && countries.indexOf(country) === -1) countries.push(country);
    if (city && cities.indexOf(city) === -1) cities.push(city);
    if (airline && airlines.indexOf(airline) === -1) airlines.push(airline);
  }
  
  fillSelect('fCountry', countries.sort(), t.all);
  fillSelect('fCity', cities.sort(), t.all);
  fillSelect('fAirline', airlines.sort(), t.all);
  fillSelect('fCategory', getUnique(allPackages, 'category'), t.all);
  fillSelect('fStartCity', getUnique(allPackages, 'cityStart'), t.all);
  
  var hotelNames = [];
  for (var j = 0; j < allPackages.length; j++) {
    var p = allPackages[j];
    var h1 = currentLang === 'ar' ? p.hotel1Name : p.hotel1NameEn;
    var h2 = currentLang === 'ar' ? p.hotel2Name : p.hotel2NameEn;
    if (h1) { 
      var h1T = String(h1).trim(); 
      if (h1T && hotelNames.indexOf(h1T) === -1) hotelNames.push(h1T); 
    }
    if (h2) { 
      var h2T = String(h2).trim(); 
      if (h2T && hotelNames.indexOf(h2T) === -1) hotelNames.push(h2T); 
    }
  }
  fillSelect('fHotel', hotelNames.sort(), t.all);
  fillSelect('fSalesPercent', ['0-25%', '25-50%', '50-75%', '75-100%'], t.all);
}

function onCountryChange() {
  var t = T[currentLang];
  var country = gv('fCountry');
  var filtered = country ? allFlights.filter(function(f) { 
    return String(f.country || '').trim() === country; 
  }) : allFlights;
  
  fillSelect('fCity', getUnique(filtered, 'city'), t.all);
  fillSelect('fAirline', getUnique(filtered, 'airline'), t.all);
  doSearch();
}

function clearAll() {
  ['fCountry', 'fCity', 'fAirline', 'fCategory', 'fStartCity', 'fHotel', 'fSalesPercent', 'fPackage', 'fPNR', 'sortBy'].forEach(function(id) { 
    sv(id, ''); 
  });
  sc('showSoldOut', false); 
  selectedForCompare = []; 
  updateCompareCount(); 
  onCountryChange();
}

// ==================== البحث في الباقات ====================
function doSearch() {
  var showSoldOut = gc('showSoldOut');
  var filters = { 
    country: gv('fCountry'), 
    city: gv('fCity'), 
    airline: gv('fAirline'), 
    category: gv('fCategory'), 
    startCity: gv('fStartCity'), 
    hotel: gv('fHotel'), 
    salesPercent: gv('fSalesPercent'), 
    pkgName: gv('fPackage').toLowerCase(), 
    pnr: gv('fPNR').toUpperCase() 
  };
  
  var results = allPackages.filter(function(p) {
    // فلتر المباع
    if (!showSoldOut && p.isSoldOut) return false;
    
    // فلتر الفئة
    if (filters.category && String(p.category || '').trim() !== filters.category) return false;
    
    // فلتر مدينة البداية
    if (filters.startCity && String(p.cityStart || '').trim() !== filters.startCity) return false;
    
    // فلتر الفندق
    if (filters.hotel) {
      var h1 = currentLang === 'ar' ? p.hotel1Name : p.hotel1NameEn;
      var h2 = currentLang === 'ar' ? p.hotel2Name : p.hotel2NameEn;
      if (String(h1 || '').trim() !== filters.hotel && String(h2 || '').trim() !== filters.hotel) return false;
    }
    
    // فلتر نسبة البيع
    if (filters.salesPercent) {
      var sp = p.salesPercent || 0;
      if (filters.salesPercent === '0-25%' && (sp < 0 || sp >= 25)) return false;
      if (filters.salesPercent === '25-50%' && (sp < 25 || sp >= 50)) return false;
      if (filters.salesPercent === '50-75%' && (sp < 50 || sp >= 75)) return false;
      if (filters.salesPercent === '75-100%' && sp < 75) return false;
    }
    
    // فلتر اسم الباقة
    if (filters.pkgName) {
      var name = currentLang === 'ar' ? p.name : p.nameEn;
      if (String(name || '').toLowerCase().indexOf(filters.pkgName) === -1) return false;
    }
    
    // فلتر الدولة/المدينة/الطيران/PNR
    if (filters.country || filters.city || filters.airline || filters.pnr) {
      var linkedFlights = getFilteredLinkedFlights(p, filters);
      if (linkedFlights.length === 0) return false;
      if (filters.pnr) {
        var hasPNR = linkedFlights.some(function(fl) { 
          return String(fl.pnr || '').toUpperCase().indexOf(filters.pnr) !== -1; 
        });
        if (!hasPNR) return false;
      }
    }
    
    return true;
  });
  
  // الترتيب
  var sortBy = gv('sortBy');
  results = sortResults(results, sortBy);
  
  currentResults = results;
  showResults(results, filters, showSoldOut);
}

function sortResults(r, s) {
  var sorted = r.slice();
  if (s === 'price-asc') sorted.sort(function(a, b) { return (a.price || 0) - (b.price || 0); });
  else if (s === 'price-desc') sorted.sort(function(a, b) { return (b.price || 0) - (a.price || 0); });
  else if (s === 'remaining-desc') sorted.sort(function(a, b) { return (b.remaining || 0) - (a.remaining || 0); });
  else if (s === 'sales-desc') sorted.sort(function(a, b) { return (b.salesPercent || 0) - (a.salesPercent || 0); });
  return sorted;
}

function getAllLinkedFlights(p) {
  var n = Number(p.nuskNo);
  if (!n) return [];
  return allFlights.filter(function(f) { 
    return f.linkedNusk && f.linkedNusk.indexOf(n) !== -1; 
  });
}

function getFilteredLinkedFlights(p, filters) {
  var allLinked = getAllLinkedFlights(p);
  if (!filters.country && !filters.city && !filters.airline) return allLinked;
  
  return allLinked.filter(function(fl) {
    return (!filters.country || String(fl.country || '').trim() === filters.country) &&
           (!filters.city || String(fl.city || '').trim() === filters.city) &&
           (!filters.airline || String(fl.airline || '').trim() === filters.airline);
  });
}

function getPackageCountries(p) {
  var n = Number(p.nuskNo);
  if (!n) return [];
  var c = [];
  for (var i = 0; i < allFlights.length; i++) {
    var f = allFlights[i];
    var country = String(f.country || '').trim();
    if (f.linkedNusk && f.linkedNusk.indexOf(n) !== -1 && country && c.indexOf(country) === -1) {
      c.push(country);
    }
  }
  return c;
}

// ==================== عرض النتائج ====================
function showResults(r, f, show) {
  var t = T[currentLang];
  document.getElementById('resultCount').textContent = r.length;
  var a = document.getElementById('resultsArea');
  
  if (r.length === 0) { 
    a.innerHTML = '<div class="no-results">😕 ' + t.noResults + '</div>'; 
    return; 
  }
  
  var h = '<div class="packages-grid">';
  for (var i = 0; i < r.length; i++) {
    h += createCard(r[i], f, show);
  }
  h += '</div>';
  a.innerHTML = h;
}

/**
 * إنشاء HTML لتوفر الغرف
 * hotelAvail = { dbl: 'available', tri: 'unavailable', quad: 'unconfirmed' }
 */
function createRoomBadges(hotelAvail) {
  if (!hotelAvail) return '';
  var t = T[currentLang];
  var html = '<div class="room-badges">';
  
  var types = [
    { key: 'dbl', label: t.dbl },
    { key: 'tri', label: t.tri },
    { key: 'quad', label: t.quad }
  ];
  
  for (var i = 0; i < types.length; i++) {
    var status = hotelAvail[types[i].key];
    if (!status) continue;
    
    var cssClass = 'room-badge ';
    var icon = '';
    if (status === 'available')    { cssClass += 'room-available';    icon = '🟢'; }
    if (status === 'unavailable')  { cssClass += 'room-unavailable';  icon = '🔴'; }
    if (status === 'unconfirmed')  { cssClass += 'room-unconfirmed';  icon = '🟡'; }
    
    html += '<span class="' + cssClass + '">' + icon + ' ' + types[i].label + '</span>';
  }
  
  html += '</div>';
  return html;
}

function createCard(p, f, show) {
  var t = T[currentLang];
  var fl = getFilteredLinkedFlights(p, f);
  var name = currentLang === 'ar' ? p.name : p.nameEn;
  var sold = p.isSoldOut;
  var isSelected = selectedForCompare.indexOf(p.nuskNo) !== -1;
  
  // دول الباقة
  var countries = getPackageCountries(p);
  var countriesHtml = countries.length > 0 ? '<div class="card-countries">' + countries.map(function(c) { 
    return '<span class="country-tag">' + c + '</span>'; 
  }).join('') + '</div>' : '';
  
  // مدن الفنادق
  var hasMak = String(p.hotel1City || '').trim() === 'Mak' || String(p.hotel2City || '').trim() === 'Mak';
  var hasMed = String(p.hotel1City || '').trim() === 'Med' || String(p.hotel2City || '').trim() === 'Med';
  
  // الشارات
  var badges = '<div class="info-badges">' +
    '<span class="badge">📅 ' + (p.noDays || '-') + ' ' + t.days + '</span>' +
    (hasMed ? '<span class="badge">🕌 ' + t.madinah + '</span>' : '') +
    (hasMak ? '<span class="badge makkah">🕋 ' + t.makkah + '</span>' : '') +
    '</div>';
  
  // قسم المبيعات
  var sp = p.salesPercent || 0;
  var pc = getProgressClass(sp);
  var salesHtml = '<div class="sales-section">' +
    '<div class="sales-header">' +
    '<span class="sales-title">📊 ' + t.sales + '</span>' +
    '<span class="sales-percent ' + (sp >= 75 ? 'high' : sp >= 50 ? 'medium' : '') + '">' + Math.round(sp) + '%</span>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill ' + pc + '" style="width:' + Math.min(sp, 100) + '%"></div></div>' +
    '<div class="sales-stats">' +
    '<span>' + t.capacity + ': ' + p.capacity + '</span>' +
    '<span>' + t.sold + ': ' + p.salesCount + '</span>' +
    '<span>' + t.remaining + ': ' + p.remaining + '</span>' +
    '</div></div>';
  
  // الفنادق مع توفر الغرف
  var hH = '';
  var ra = p.roomAvail;
  var hL = [
    { c: p.hotel1City, n: p.hotel1Name, e: p.hotel1NameEn, i: p.hotel1CheckIn, o: p.hotel1CheckOut, nights: p.hotel1Nights, avail: ra ? ra.h1 : null },
    { c: p.hotel2City, n: p.hotel2Name, e: p.hotel2NameEn, i: p.hotel2CheckIn, o: p.hotel2CheckOut, nights: p.hotel2Nights, avail: ra ? ra.h2 : null },
    { c: p.hotel3City, n: p.hotel3Name, e: p.hotel3NameEn, i: p.hotel3CheckIn, o: p.hotel3CheckOut, nights: p.hotel3Nights, avail: ra ? ra.h3 : null }
  ];
  
  for (var h = 0; h < hL.length; h++) {
    var ht = hL[h];
    if (ht.n) {
      var nm = currentLang === 'ar' ? (ht.n || ht.e) : (ht.e || ht.n);
      var htCity = String(ht.c || '').trim();
      var ct = htCity === 'Mak' ? t.makkah : (htCity === 'Med' ? t.madinah : '');
      var cityClass = htCity === 'Mak' ? 'makkah' : '';
      var dates = (ht.i && ht.o) ? ht.i + ' - ' + ht.o : '';
      var nightsHtml = ht.nights ? '<span class="hotel-nights">' + ht.nights + ' ' + t.nights + '</span>' : '';
      var mapLink = getHotelMapLink(ht.n, ht.e);
      var locBtn = mapLink ? '<a href="' + mapLink + '" target="_blank" class="hotel-location">📍</a>' : '';
      
      if (ct) {
        hH += '<div class="hotel-item">' +
          '<div class="hotel-info">' +
          '<span class="hotel-city ' + cityClass + '">' + ct + '</span>' +
          '<span class="hotel-name">' + nm + '</span>' +
          (dates ? '<span class="hotel-dates">' + dates + '</span>' : '') +
          nightsHtml +
          '</div>' + locBtn + '</div>';
        
        // إضافة badges توفر الغرف بعد كل فندق
        hH += createRoomBadges(ht.avail);
      }
    }
  }
  
  // إضافة آخر تحديث لتوفر الغرف
  if (ra && ra.lastUpdate) {
    hH += '<div class="room-last-update">🕐 ' + t.lastUpdate + ': ' + ra.lastUpdate + '</div>';
  }
  
  // الرحلات حسب المدينة — إخفاء التذاكر المكتملة
  var cityGroups = {};
  for (var j = 0; j < fl.length; j++) {
    var fx = fl[j];
    // إخفاء التذاكر المكتملة من نتائج الباقات
    if (fx.isSoldOut) continue;
    
    var city = String(fx.city || 'Other').trim();
    if (!cityGroups[city]) {
      cityGroups[city] = { flights: [], total: 0, sold: 0, remaining: 0 };
    }
    cityGroups[city].flights.push(fx);
    cityGroups[city].total += fx.pax || 0;
    cityGroups[city].sold += fx.salesCount || 0;
    cityGroups[city].remaining += fx.remaining || 0;
  }
  
  var fH = '';
  for (var city in cityGroups) {
    var cg = cityGroups[city];
    fH += '<div class="city-group">' +
      '<div class="city-group-header">' +
      '<span class="city-group-name">🌍 ' + city + ' (' + cg.flights.length + ' PNR)</span>' +
      '<span class="city-group-stats">' +
      '<span>' + t.total + ': ' + cg.total + '</span>' +
      '<span>' + t.sold + ': ' + cg.sold + '</span>' +
      '<span>' + t.remaining + ': ' + cg.remaining + '</span>' +
      '</span></div>';
    
    for (var k = 0; k < cg.flights.length; k++) {
      var ff = cg.flights[k];
      var fsp = ff.salesPercent || 0;
      var fpc = getProgressClass(fsp);
      fH += '<div class="flight-item-simple">' +
        '<span class="flight-pnr-small">' + ff.pnr + '</span>' +
        '<span class="flight-airline-small">✈️ ' + ff.airline + '</span>' +
        '<div class="flight-stats-small">' +
        '<div class="progress-bar-small"><div class="progress-fill ' + fpc + '" style="width:' + Math.min(fsp, 100) + '%"></div></div>' +
        '<span>' + ff.salesCount + '/' + ff.pax + '</span>' +
        '</div></div>';
    }
    fH += '</div>';
  }
  
  // الشارة والسعر والأزرار
  var badge = sold ? '<span class="sold-out-badge">' + t.soldOut + '</span>' : '';
  var priceHtml = p.price > 0 ? '<div class="price-box"><span class="price-label">' + t.pkgPrice + '</span><span class="price">' + fmtN(p.price) + ' <span>' + t.sar + '</span></span></div>' : '';
  var bookBtn = p.bookingLink ? '<a href="' + p.bookingLink + '" target="_blank" class="icon-btn btn-book">' + t.bookNow + '</a>' : '';
  
  var encName = encodeURIComponent(name);
  var encLink = encodeURIComponent(p.bookingLink || '');
  
  return '<div class="card' + (sold ? ' sold-out' : '') + (isSelected ? ' selected' : '') + '">' +
    '<div class="card-header">' + badge +
    '<span class="card-category">' + (p.category || 'Standard') + '</span>' +
    '<input type="checkbox" class="card-select" ' + (isSelected ? 'checked' : '') + ' onchange="toggleCompare(' + p.nuskNo + ')">' +
    '<h3>' + name + '</h3>' + countriesHtml +
    '</div>' +
    '<div class="card-body">' + badges + salesHtml +
    (hH ? '<div class="section"><div class="section-title">🏨 ' + t.hotels + '</div>' + hH + '</div>' : '') +
    (fH ? '<div class="section"><div class="section-title">✈️ ' + t.linkedFlights + '</div>' + fH + '</div>' : '') +
    '</div>' +
    '<div class="card-footer">' + priceHtml +
    '<div class="action-btns">' +
    '<button class="icon-btn btn-whatsapp-icon" onclick="shareWA(\'' + encName + '\',' + (p.price || 0) + ',\'' + encLink + '\',' + (p.capacity || 0) + ',' + (p.remaining || 0) + ')">📱</button>' +
    '<button class="icon-btn btn-email" onclick="shareEm(\'' + encName + '\',' + (p.price || 0) + ',\'' + encLink + '\')">✉️</button>' +
    '<button class="icon-btn btn-copy" onclick="copyLink(\'' + encLink + '\')">🔗</button>' +
    bookBtn +
    '</div></div></div>';
}

// ==================== المقارنة ====================
function toggleCompare(nuskNo) {
  var idx = selectedForCompare.indexOf(nuskNo);
  if (idx === -1) { 
    if (selectedForCompare.length >= 3) return; 
    selectedForCompare.push(nuskNo); 
  } else { 
    selectedForCompare.splice(idx, 1); 
  }
  updateCompareCount();
  doSearch();
}

function updateCompareCount() { 
  document.getElementById('compareCount').textContent = selectedForCompare.length; 
}

function openCompare() {
  var t = T[currentLang];
  if (selectedForCompare.length < 2) { 
    alert(t.selectAtLeast2); 
    return; 
  }
  
  var pkgs = allPackages.filter(function(p) { 
    return selectedForCompare.indexOf(p.nuskNo) !== -1; 
  });
  
  var html = '<table class="compare-table"><thead><tr><th class="label-col"></th>';
  for (var i = 0; i < pkgs.length; i++) {
    html += '<th>' + (currentLang === 'ar' ? pkgs[i].name : pkgs[i].nameEn) + '</th>';
  }
  html += '</tr></thead><tbody>';
  
  // السعر
  html += '<tr><td class="label-col">💰 ' + t.price + '</td>';
  for (var j = 0; j < pkgs.length; j++) {
    html += '<td>' + fmtN(pkgs[j].price) + ' ' + t.sar + '</td>';
  }
  html += '</tr>';
  
  // المدة
  html += '<tr><td class="label-col">📅 ' + t.duration + '</td>';
  for (var k = 0; k < pkgs.length; k++) {
    html += '<td>' + pkgs[k].noDays + ' ' + t.days + '</td>';
  }
  html += '</tr>';
  
  // السعة
  html += '<tr><td class="label-col">👥 ' + t.capacity + '</td>';
  for (var m = 0; m < pkgs.length; m++) {
    html += '<td>' + pkgs[m].capacity + '</td>';
  }
  html += '</tr>';
  
  // المتبقي
  html += '<tr><td class="label-col">✅ ' + t.remaining + '</td>';
  for (var n = 0; n < pkgs.length; n++) {
    html += '<td>' + pkgs[n].remaining + '</td>';
  }
  html += '</tr>';
  
  html += '</tbody></table>';
  
  document.getElementById('compareTableArea').innerHTML = html;
  document.getElementById('compareModal').classList.add('show');
}

function closeCompare() { 
  document.getElementById('compareModal').classList.remove('show'); 
}

function exportCompareImage() {
  html2canvas(document.getElementById('compareContent')).then(function(canvas) {
    var link = document.createElement('a');
    link.download = 'compare_' + Date.now() + '.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
