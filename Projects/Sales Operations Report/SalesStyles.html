<style>
  /* ══════════════════════════════════════════════
     Sales Report - Styles v1.0
     Design: Professional Dashboard - Green/Dark theme
     ══════════════════════════════════════════════ */
  
  :root {
    --green-800: #1a4d2e;
    --green-700: #2d5a33;
    --green-600: #3c7b44;
    --green-500: #4caf50;
    --green-100: #e8f5e9;
    --red-600: #dc3545;
    --red-100: #ffebee;
    --orange-600: #fd7e14;
    --orange-100: #fff3e0;
    --blue-600: #1565c0;
    --blue-100: #e3f2fd;
    --gray-900: #1a1a2e;
    --gray-800: #2d2d44;
    --gray-100: #f8f9fa;
    --gray-200: #e9ecef;
    --gray-400: #ced4da;
    --gray-600: #6c757d;
    --gold: #c9a227;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--gray-100);
    color: #333;
    min-height: 100vh;
  }
  
  body.rtl { direction: rtl; text-align: right; }
  body.ltr { direction: ltr; text-align: left; }
  
  /* ── Header ── */
  .report-header {
    background: linear-gradient(135deg, var(--green-800) 0%, var(--green-700) 50%, var(--green-600) 100%);
    color: #fff;
    padding: 18px 24px;
    position: relative;
  }
  
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  
  .header-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,.3);
    box-shadow: 0 4px 15px rgba(0,0,0,.2);
  }
  
  .report-header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -.5px;
  }
  
  .report-header p {
    font-size: .85rem;
    opacity: .85;
  }
  
  .lang-toggle {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff;
    padding: 5px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    font-size: .8rem;
  }
  
  body.ltr .lang-toggle { left: auto; right: 12px; }
  
  .lang-toggle option { color: #333; background: #fff; }
  
  /* ── KPI Strip ── */
  .kpi-strip {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px 24px;
    background: #fff;
    box-shadow: var(--shadow);
    border-bottom: 3px solid var(--green-600);
    flex-wrap: wrap;
  }
  
  .kpi-card {
    text-align: center;
    min-width: 130px;
    padding: 12px 20px;
    border-radius: var(--radius);
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    transition: transform .2s;
  }
  
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  
  .kpi-icon { font-size: 1.4rem; margin-bottom: 4px; }
  
  .kpi-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--green-700);
    line-height: 1.2;
  }
  
  .kpi-sold .kpi-value { color: var(--green-500); }
  .kpi-remaining .kpi-value { color: var(--orange-600); }
  .kpi-pct .kpi-value { color: var(--blue-600); }
  
  .kpi-label {
    font-size: .75rem;
    color: var(--gray-600);
    margin-top: 2px;
  }
  
  /* ── Filters ── */
  .filters-bar {
    background: #fff;
    padding: 14px 24px;
    border-bottom: 1px solid var(--gray-200);
  }
  
  .filters-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }
  
  .filter-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  
  .filter-item label {
    font-size: .72rem;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  
  .filter-item select {
    padding: 7px 12px;
    border: 1px solid var(--gray-400);
    border-radius: 6px;
    font-family: inherit;
    font-size: .85rem;
    min-width: 150px;
    background: #fff;
  }
  
  .filter-item select:focus {
    border-color: var(--green-600);
    outline: none;
    box-shadow: 0 0 0 2px rgba(60,123,68,.15);
  }
  
  .filter-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .btn-filter, .btn-clear, .btn-export, .btn-print {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  
  .btn-filter { background: var(--green-600); color: #fff; }
  .btn-filter:hover { background: var(--green-700); }
  .btn-clear { background: var(--gray-200); color: #333; }
  .btn-clear:hover { background: var(--gray-400); }
  .btn-export { background: var(--blue-600); color: #fff; }
  .btn-export:hover { background: #0d47a1; }
  .btn-print { background: var(--gray-600); color: #fff; }
  .btn-print:hover { background: #495057; }
  
  /* ── Main Content ── */
  .main-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
  }
  
  /* ── Loading ── */
  .loading-box {
    text-align: center;
    padding: 60px 20px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  
  .spinner {
    width: 44px;
    height: 44px;
    border: 4px solid var(--gray-200);
    border-top-color: var(--green-600);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* ── Report Sections ── */
  .report-section {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--green-800), var(--green-700));
    color: #fff;
  }
  
  .section-header h2 {
    font-size: 1rem;
    font-weight: 700;
  }
  
  .section-count {
    background: rgba(255,255,255,.2);
    padding: 3px 12px;
    border-radius: 15px;
    font-size: .8rem;
  }
  
  /* ── Tables ── */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .85rem;
  }
  
  .data-table th {
    background: var(--gray-100);
    padding: 10px 14px;
    font-weight: 700;
    color: var(--gray-800);
    border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
    text-align: center;
  }
  
  body.rtl .data-table th:first-child,
  body.ltr .data-table th:first-child {
    text-align: start;
  }
  
  .data-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--gray-200);
    text-align: center;
    white-space: nowrap;
  }
  
  body.rtl .data-table td:first-child,
  body.ltr .data-table td:first-child {
    text-align: start;
    font-weight: 600;
  }
  
  .data-table tbody tr:hover {
    background: var(--green-100);
  }
  
  .data-table tfoot td {
    font-weight: 800;
    background: var(--gray-100);
    border-top: 2px solid var(--green-600);
    color: var(--green-800);
  }
  
  /* Progress bar in table */
  .progress-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
  }
  
  .mini-bar {
    flex: 1;
    height: 8px;
    background: var(--gray-200);
    border-radius: 4px;
    overflow: hidden;
    min-width: 60px;
  }
  
  .mini-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s ease;
  }
  
  .mini-bar-fill.low { background: linear-gradient(90deg, #28a745, #20c997); }
  .mini-bar-fill.medium { background: linear-gradient(90deg, #fd7e14, #ffc107); }
  .mini-bar-fill.high { background: linear-gradient(90deg, #dc3545, #e91e63); }
  .mini-bar-fill.full { background: #6c757d; }
  
  .pct-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: .75rem;
    font-weight: 700;
    min-width: 48px;
    text-align: center;
    display: inline-block;
  }
  
  .pct-badge.low { background: var(--green-100); color: #2e7d32; }
  .pct-badge.medium { background: var(--orange-100); color: #e65100; }
  .pct-badge.high { background: var(--red-100); color: #c62828; }
  
  /* Country tags */
  .country-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  
  .country-tag {
    background: var(--blue-100);
    color: var(--blue-600);
    padding: 1px 7px;
    border-radius: 8px;
    font-size: .7rem;
    font-weight: 600;
  }
  
  /* ── Charts ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
  }
  
  .chart-box {
    background: var(--gray-100);
    border-radius: 8px;
    padding: 16px;
    border: 1px solid var(--gray-200);
  }
  
  .chart-box h3 {
    font-size: .9rem;
    color: var(--green-800);
    margin-bottom: 12px;
    text-align: center;
  }
  
  .chart-full {
    grid-column: 1 / -1;
  }
  
  /* ── Footer ── */
  .report-footer {
    background: var(--gray-900);
    color: rgba(255,255,255,.7);
    padding: 12px 24px;
    font-size: .78rem;
  }
  
  .footer-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .auto-refresh-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .pulse-dot {
    width: 8px;
    height: 8px;
    background: var(--green-500);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }
  
  /* ── Print ── */
  @media print {
    .report-header, .filters-bar, .filter-actions, .report-footer { display: none !important; }
    .report-section { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    .kpi-strip { box-shadow: none; border: 1px solid #ddd; }
    body { background: #fff; }
    .main-content { padding: 10px; }
  }
  
  /* ── Mobile ── */
  @media (max-width: 768px) {
    .kpi-strip { gap: 8px; padding: 12px; }
    .kpi-card { min-width: 90px; padding: 8px 12px; }
    .kpi-value { font-size: 1.3rem; }
    .filters-inner { flex-direction: column; align-items: stretch; }
    .filter-item select { min-width: auto; width: 100%; }
    .charts-grid { grid-template-columns: 1fr; }
    .header-inner h1 { font-size: 1.1rem; }
  }
</style>
